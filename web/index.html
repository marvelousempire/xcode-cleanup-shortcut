<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cleanup Hub</title>
<style>
  :root {
    color-scheme: light dark;

    /* Neutrals — warm grayscale */
    --bg-1: #FAFAF7;
    --bg-2: rgba(255,255,255,0.78);
    --bg-3: rgba(255,255,255,0.55);
    --border: rgba(11,11,12,0.08);
    --border-2: rgba(11,11,12,0.05);
    --border-strong: rgba(11,11,12,0.14);
    --text: #171719;
    --text-dim: #5C5C66;
    --text-faint: #9999A3;

    /* Accent — deep teal (precision instrument) */
    --accent: #0F766E;
    --accent-strong: #115E59;
    --accent-soft: rgba(15,118,110,0.10);

    /* Semantic — safety tiers (1:1 with cleaners.py) */
    --safe: #16A34A;
    --safe-soft: rgba(22,163,74,0.10);
    --warn: #D97706;
    --warn-soft: rgba(217,119,6,0.10);
    --danger: #B91C1C;
    --danger-soft: rgba(185,28,28,0.10);

    /* Legacy aliases — kept so older selectors keep working until fully renamed */
    --green: var(--safe);
    --orange: var(--warn);
    --red: var(--danger);

    /* Typography */
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --mono: var(--font-mono);

    /* Radii */
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 18px;
    --r-pill: 999px;
    --radius: var(--r-lg);
    --radius-sm: 8px;

    /* Elevation */
    --shadow-sm: 0 1px 2px rgba(11,11,12,0.04), 0 2px 8px rgba(11,11,12,0.03);
    --shadow-md: 0 2px 4px rgba(11,11,12,0.05), 0 8px 24px rgba(11,11,12,0.06);
    --shadow-lg: 0 8px 16px rgba(11,11,12,0.10), 0 24px 64px rgba(11,11,12,0.18);
    --shadow: var(--shadow-sm);

    /* Motion */
    --d-instant: 80ms;
    --d-quick: 160ms;
    --d-normal: 220ms;
    --d-slow: 600ms;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    --sidebar-w-left: 220px;
    --sidebar-w-right: 220px;
  }

  /* v0.18.3 — dark-mode tokens.
     Two activation paths so the user's manual choice (data-theme=dark) wins
     over the OS preference, and an explicit data-theme=light forces light
     even when the OS is set to dark. */
  :root[data-theme="dark"],
  :root:not([data-theme="light"]) {
    /* placeholder — actual rules below are gated by the @media query so they
       only apply in "Auto" mode when the OS is dark, OR via the
       :root[data-theme="dark"] selector below. */
  }
  :root[data-theme="dark"] {
    --bg-1: #0B0B0C;
    --bg-2: rgba(22,22,24,0.78);
    --bg-3: rgba(34,34,38,0.55);
    --border: rgba(255,255,255,0.10);
    --border-2: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.16);
    --text: #F4F4F2;
    --text-dim: #9B9BA3;
    --text-faint: #6C6C76;

    --accent: #2DD4BF;
    --accent-strong: #5EEAD4;
    --accent-soft: rgba(45,212,191,0.12);

    --safe: #22C55E;
    --safe-soft: rgba(34,197,94,0.14);
    --warn: #FBBF24;
    --warn-soft: rgba(251,191,36,0.14);
    --danger: #EF4444;
    --danger-soft: rgba(239,68,68,0.14);

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
    --shadow-md: 0 2px 4px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.5);
    --shadow-lg: 0 8px 16px rgba(0,0,0,0.5), 0 24px 64px rgba(0,0,0,0.7);
    --shadow: var(--shadow-sm);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]):not([data-theme="dark"]) {
      --bg-1: #0B0B0C;
      --bg-2: rgba(22,22,24,0.78);
      --bg-3: rgba(34,34,38,0.55);
      --border: rgba(255,255,255,0.10);
      --border-2: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.16);
      --text: #F4F4F2;
      --text-dim: #9B9BA3;
      --text-faint: #6C6C76;

      --accent: #2DD4BF;
      --accent-strong: #5EEAD4;
      --accent-soft: rgba(45,212,191,0.12);

      --safe: #22C55E;
      --safe-soft: rgba(34,197,94,0.14);
      --warn: #FBBF24;
      --warn-soft: rgba(251,191,36,0.14);
      --danger: #EF4444;
      --danger-soft: rgba(239,68,68,0.14);

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 2px 4px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 16px rgba(0,0,0,0.5), 0 24px 64px rgba(0,0,0,0.7);
      --shadow: var(--shadow-sm);
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-sans);
    background: var(--bg-1);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    min-height: 100vh;
    background-image:
      radial-gradient(at 20% 0%,   rgba(15,118,110,0.07) 0, transparent 50%),
      radial-gradient(at 80% 100%, rgba(22,163,74,0.05)  0, transparent 50%);
    padding: 28px 24px 96px;
  }
  :root[data-theme="dark"] body {
    background-image:
      radial-gradient(at 20% 0%,   rgba(45,212,191,0.08) 0, transparent 50%),
      radial-gradient(at 80% 100%, rgba(34,197,94,0.05)  0, transparent 50%);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]):not([data-theme="dark"]) body {
      background-image:
        radial-gradient(at 20% 0%,   rgba(45,212,191,0.08) 0, transparent 50%),
        radial-gradient(at 80% 100%, rgba(34,197,94,0.05)  0, transparent 50%);
    }
  }
  .app-shell { max-width: 1280px; margin: 0 auto; }

  ::selection { background: var(--accent-soft); color: var(--accent-strong); }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

  /* ── Header ──────────────────────────────────────────────── */
  header.app-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  header.app-header .logo {
    width: 26px; height: 26px;
    color: var(--accent);
    flex-shrink: 0;
  }
  /* Running-cleans widget — appears in the header when one or more SSE clean
     streams are active. Pulses a small spinner + shows category dots. */
  .running-widget {
    display: inline-flex; align-items: center; gap: 8px;
    margin-left: 14px;
    padding: 4px 10px 4px 8px;
    border-radius: 999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    animation: running-pulse 1.8s var(--ease-in-out) infinite;
  }
  @keyframes running-pulse {
    0%, 100% { box-shadow: 0 0 0 0 hsl(var(--accent-h, 175 60% 40%) / 0.0); }
    50%      { box-shadow: 0 0 0 4px hsl(var(--accent-h, 175 60% 40%) / 0.10); }
  }
  .running-widget .running-spinner {
    width: 10px; height: 10px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 999px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .running-widget .running-label strong { color: var(--text); font-weight: 600; }
  .running-widget .running-dots {
    display: inline-flex; gap: 3px; margin-left: 2px;
  }
  .running-widget .running-dot {
    width: 6px; height: 6px; border-radius: 999px;
  }

  header.app-header h1 {
    margin: 0;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  header.app-header .badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }

  /* ── Three-column grid ──────────────────────────────────── */
  .app-grid {
    display: grid;
    grid-template-columns: var(--sidebar-w-left) 1fr var(--sidebar-w-right);
    gap: 18px;
    align-items: start;
  }
  .app-grid.no-right {
    grid-template-columns: var(--sidebar-w-left) 1fr;
  }
  .sidebar-left, .sidebar-right {
    position: sticky;
    top: 20px;
    align-self: start;
  }
  .viewport { min-width: 0; }

  /* ── Card ───────────────────────────────────────────────── */
  .card {
    background: var(--bg-2);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card.elevated { box-shadow: var(--shadow-md); }

  /* ── Vertical tab nav (left + right sidebars) ───────────── */
  .vnav {
    background: var(--bg-2);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 6px;
    display: flex; flex-direction: column; gap: 2px;
  }
  /* v0.18.3 — three-state theme toggle pinned below the category list. */
  .theme-toggle {
    margin-top: 10px;
    padding: 8px 6px 4px;
    border-top: 1px solid var(--border-2);
  }
  .theme-toggle-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint);
    padding: 0 6px 6px;
  }
  .theme-toggle-segments {
    display: flex; gap: 2px;
    padding: 2px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
  }
  .theme-seg {
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    appearance: none; border: none;
    padding: 4px 6px;
    background: transparent;
    color: var(--text-dim);
    font: inherit; font-size: 11px; font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    transition: background var(--d-quick) var(--ease-out), color var(--d-quick) var(--ease-out);
  }
  .theme-seg svg { width: 12px; height: 12px; flex-shrink: 0; }
  .theme-seg:hover { background: var(--bg-3); color: var(--text); }
  .theme-seg[aria-checked="true"] {
    background: var(--accent);
    color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .vnav .vnav-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    padding: 8px 12px 4px;
  }
  .vnav .vtab {
    appearance: none;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    padding: 9px 12px 9px 11px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: background var(--d-quick) var(--ease-out),
                color var(--d-quick) var(--ease-out),
                border-left-color var(--d-quick) var(--ease-out);
    display: flex; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  .vnav .vtab svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-faint); transition: color var(--d-quick) var(--ease-out); }
  .vnav .vtab:hover { color: var(--text); background: var(--bg-3); }
  .vnav .vtab.active {
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-left-color: var(--accent);
  }
  .vnav .vtab.active svg { color: var(--accent); }
  .vnav .vtab .vtab-stat {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .vnav .vtab.active .vtab-stat { color: var(--accent); }

  /* Compact variant for right sub-nav */
  .sidebar-right .vnav .vtab { font-size: 12px; padding: 8px 12px 8px 11px; }
  .sidebar-right .vnav .vtab svg { width: 14px; height: 14px; }

  /* ── Panel framework ────────────────────────────────────── */
  .panel { display: none; }
  .panel.active { display: block; }
  .sub-panel { display: none; }
  .sub-panel.active { display: block; }

  /* ── Overview 3-pane top: hero · pie · terminal ─────────── */
  .overview-top {
    display: grid;
    grid-template-columns: 1fr 0.92fr 1.05fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .overview-top .pane {
    background: var(--bg-2);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 280px;
  }
  .overview-top .pane.pane-hero { box-shadow: var(--shadow-md); }
  .overview-top .pane-title {
    padding: 12px 16px 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  /* Hero pane reuses overview-hero internals — just remove margin since the
     pane handles its own border + bg. */
  .overview-top .pane-hero .overview-hero {
    border: none; background: transparent; box-shadow: none;
    border-radius: 0;
    margin-bottom: 0;
    padding: 28px 24px 22px;
  }
  /* Pie pane */
  .pie-wrap {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 4px 14px 14px;
    position: relative;
  }
  .pie-svg {
    width: 168px; height: 168px;
    transform: rotate(-90deg);
  }
  .pie-svg path {
    transition: opacity var(--d-quick) var(--ease-out);
  }
  .pie-svg path.empty { fill: var(--border); }
  .pie-center-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, calc(-50% + 8px));
    text-align: center;
    pointer-events: none;
  }
  .pie-center-label .num {
    font-size: 22px; font-weight: 700; letter-spacing: -0.015em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .pie-center-label .unit { display: block; font-size: 9px; color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
  .pie-legend {
    margin-top: 10px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 12px;
    width: 100%;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .pie-legend .legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background var(--d-quick) var(--ease-out);
  }
  .pie-legend .legend-item:hover { background: var(--bg-3); color: var(--text); }

  /* Slice hover affordance — slight outward bump on the underlying path. */
  .pie-svg .pie-slices path,
  .pie-svg .pie-slices circle {
    transition: transform 0.18s var(--ease-out), filter 0.18s var(--ease-out);
    transform-origin: 50px 50px;
  }
  .pie-svg .pie-slices path:hover,
  .pie-svg .pie-slices circle:hover {
    transform: scale(1.025);
    filter: brightness(1.06);
  }

  /* Pie tooltip — fixed-positioned chip that follows the cursor on slice hover. */
  .pie-tooltip {
    position: fixed; top: 0; left: 0;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    font-size: 11px; line-height: 1.2;
    color: var(--text);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 14px hsl(0 0% 0% / 0.18);
    pointer-events: none;
    opacity: 0;
    z-index: 1000;
    transition: opacity 0.12s var(--ease-out);
    will-change: transform, opacity;
    font-variant-numeric: tabular-nums;
  }
  .pie-tooltip-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }

  /* First-visit onboarding coachmark (elevation I). Tiny accent pulse around
     the pie pane the first time the new layout loads. Dismissed on any click
     or after 12s, then never shown again (localStorage flag). */
  .coachmark {
    position: fixed; z-index: 999;
    pointer-events: none;
    border: 2px solid var(--accent);
    border-radius: var(--r-lg);
    box-shadow: 0 0 0 6px hsl(var(--accent-h, 175 60% 40%) / 0.18);
    animation: coach-pulse 1.8s var(--ease-in-out) infinite;
    transition: opacity 0.35s var(--ease-out);
  }
  @keyframes coach-pulse {
    0%, 100% { box-shadow: 0 0 0 4px hsl(var(--accent-h, 175 60% 40%) / 0.18); }
    50%      { box-shadow: 0 0 0 10px hsl(var(--accent-h, 175 60% 40%) / 0.08); }
  }
  .coachmark .coach-label {
    position: absolute;
    top: -34px; left: 50%;
    transform: translateX(-50%);
    padding: 5px 11px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
    box-shadow: 0 4px 12px hsl(0 0% 0% / 0.18);
  }
  .coachmark .coach-label::after {
    content: "";
    position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px; background: var(--accent);
  }

  /* Activity terminal search bar (elevation E) */
  .terminal-pane .terminal-toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  .terminal-pane .terminal-search {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #F4F4F2;
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 4px;
  }
  .terminal-pane .terminal-search::placeholder { color: #6B6B73; }
  .terminal-pane .terminal-clear {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: #9B9BA3;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10px;
    cursor: pointer;
    transition: color var(--d-quick) var(--ease-out), border-color var(--d-quick) var(--ease-out);
  }
  .terminal-pane .terminal-clear:hover { color: #F4F4F2; border-color: rgba(255,255,255,0.32); }
  .terminal-pane .terminal-body .out-line.filtered-out {
    opacity: 0.18;
    transition: opacity 0.18s var(--ease-out);
  }
  .terminal-pane .terminal-body .out-line .hl {
    background: hsl(45 100% 50% / 0.32);
    color: #F4F4F2;
    padding: 0 1px;
    border-radius: 2px;
  }

  /* Minimal ANSI color classes — covers \e[3xm + \e[1m. */
  .ansi-fg-red    { color: #EF4444; }
  .ansi-fg-green  { color: #22C55E; }
  .ansi-fg-yellow { color: #FBBF24; }
  .ansi-fg-blue   { color: #60A5FA; }
  .ansi-fg-magenta{ color: #C084FC; }
  .ansi-fg-cyan   { color: #22D3EE; }
  .ansi-fg-gray   { color: #9B9BA3; }
  .ansi-bold      { font-weight: 700; }

  /* Sidebar mini-donut — tiny per-tab usage breakdown next to the GB stat. */
  .vtab-mini-donut {
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.92;
    margin-left: 4px;
  }
  .vtab-mini-donut .vtab-track { fill: none; stroke: hsl(var(--border-h, 220 6% 80%) / 0.6); stroke-width: 4; }
  .vtab-mini-donut .vtab-arc   { fill: none; stroke-linecap: butt; stroke-width: 4; }
  .pie-legend .legend-dot {
    width: 8px; height: 8px; border-radius: 999px;
    flex-shrink: 0;
  }
  .pie-legend .legend-name { flex: 1; }
  .pie-legend .legend-gb { color: var(--text); font-weight: 600; }

  /* Terminal pane (always visible variant) */
  .terminal-pane {
    flex: 1;
    display: flex; flex-direction: column;
    background: rgba(11,11,12,0.92);
    color: #F4F4F2;
    margin: 0 12px 12px;
    border-radius: var(--r-sm);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .terminal-pane .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 180px;
    /* v0.18.7 — cap height so output scrolls inside the pane instead of
       stretching the Activity panel (and the whole Overview) taller. */
    max-height: 320px;
  }
  .terminal-pane .terminal-idle {
    color: #6B6B73;
    font-style: italic;
  }
  .terminal-pane .terminal-body .out-line { display: block; }
  .terminal-pane .terminal-body .ok   { color: #22C55E; }
  .terminal-pane .terminal-body .warn { color: #FBBF24; }
  .terminal-pane .terminal-body .err  { color: #EF4444; }
  .terminal-pane .terminal-body .dim  { color: #9B9BA3; }

  @media (max-width: 1100px) {
    .overview-top { grid-template-columns: 1fr 1fr; }
    .overview-top .pane-terminal { grid-column: 1 / -1; min-height: 180px; }
  }
  @media (max-width: 720px) {
    .overview-top { grid-template-columns: 1fr; }
    .overview-top .pane-terminal { grid-column: auto; }
  }

  /* ── Overview tab ───────────────────────────────────────── */
  .overview-hero {
    padding: 36px 32px 26px;
    text-align: center;
    margin-bottom: 14px;
  }
  .overview-hero .free {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
    transition: color var(--d-normal) var(--ease-out);
    will-change: transform;
  }
  .overview-hero .free .unit { font-size: 26px; font-weight: 500; color: var(--text-dim); margin-left: 6px; letter-spacing: -0.01em; }
  .overview-hero .free.good   { color: var(--safe); }
  .overview-hero .free.warn   { color: var(--warn); }
  .overview-hero .free.danger { color: var(--danger); }
  .overview-hero .label {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .overview-hero .progress-track {
    margin-top: 20px;
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .overview-hero .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width var(--d-slow) var(--ease-out), background var(--d-normal) var(--ease-out);
  }
  .overview-hero .progress-fill.warn   { background: var(--warn); }
  .overview-hero .progress-fill.danger { background: var(--danger); }
  .overview-hero .promise {
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .overview-hero .promise svg { width: 12px; height: 12px; color: var(--safe); }

  .history-strip {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: var(--r-pill);
    font-variant-numeric: tabular-nums;
  }
  .history-strip strong { color: var(--text); font-weight: 600; }
  .history-strip svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }
  .history-strip[hidden] { display: none !important; }

  .global-actions {
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .ga-row {
    display: flex; gap: 10px;
    flex-wrap: wrap;
  }
  .ga-btn {
    appearance: none; border: 1px solid var(--border);
    background: var(--bg-3); color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 11px 16px; border-radius: var(--r-md);
    cursor: pointer;
    transition: border-color var(--d-quick) var(--ease-out),
                background var(--d-quick) var(--ease-out),
                transform var(--d-instant) var(--ease-out);
    flex: 1; min-width: 0;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ga-btn svg { width: 14px; height: 14px; }
  .ga-btn:hover:not(:disabled) { border-color: var(--accent); }
  .ga-btn:active:not(:disabled) { transform: scale(0.98); }
  .ga-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .ga-btn.primary {
    background: var(--accent);
    color: white;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(15,118,110,0.20);
  }
  .ga-btn.primary:hover:not(:disabled) {
    background: var(--accent-strong);
    box-shadow: 0 4px 14px rgba(15,118,110,0.30);
  }
  .ga-hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.55;
    font-variant-numeric: tabular-nums;
  }
  .ga-hint strong { color: var(--text); font-weight: 600; }

  /* Overview summary grid */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .overview-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color var(--d-quick) var(--ease-out),
                transform var(--d-instant) var(--ease-out);
    text-align: left;
    appearance: none;
    font-family: inherit;
    color: inherit;
    width: 100%;
    box-shadow: var(--shadow-sm);
  }
  .overview-card:hover { border-color: var(--accent); }
  .overview-card:active { transform: scale(0.99); }
  .overview-card .head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .overview-card .head svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
  .overview-card .head .name { font-size: 14px; font-weight: 600; letter-spacing: -0.005em; }
  .overview-card .tagline {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  /* Per-tier stats — stacked so the sum across cards matches the "Clean ALL"
     buttons. Safe + opt-in are prominent; caution is a smaller informational
     note since the dashboard never auto-deletes caution-tier paths. */
  .overview-card .tier-stat {
    display: flex; align-items: baseline; gap: 6px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.25;
  }
  .overview-card .tier-stat .num { font-size: 22px; }
  .overview-card .tier-stat .unit { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .overview-card .tier-stat.safe { color: var(--safe); }
  .overview-card .tier-stat.warn { color: var(--warn); }
  .overview-card .tier-stat.zero {
    color: var(--text-faint);
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
  }
  .overview-card .tier-stat.caution-small {
    margin-top: 6px;
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 500;
  }
  .overview-card .tier-stat.caution-small .num { font-size: 11px; font-weight: 600; }
  .overview-card .tier-stat.caution-small::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--danger);
    opacity: 0.6;
    margin-right: 4px;
  }
  .overview-card .open-hint {
    display: flex; justify-content: flex-end; align-items: center; gap: 4px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-faint);
    transition: color var(--d-quick) var(--ease-out);
  }
  .overview-card:hover .open-hint { color: var(--accent); }
  .overview-card .open-hint svg { width: 12px; height: 12px; }

  /* ── Panel header (per-category) ────────────────────────── */
  .panel-header {
    padding: 20px 24px 18px;
    border-bottom: 1px solid var(--border-2);
  }
  .panel-header h2 {
    margin: 0;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .panel-header h2 .cat-icon { color: var(--accent); }
  .panel-header h2 .cat-icon svg { width: 16px; height: 16px; }
  .panel-header .tagline {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.5;
  }
  .panel-header .totals {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }
  .panel-header .totals .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 0;
  }
  .panel-header .totals .pill::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 999px;
    background: currentColor;
    opacity: 0.6;
  }
  .panel-header .totals .pill.safe   { color: var(--safe); }
  .panel-header .totals .pill.warn   { color: var(--warn); }
  .panel-header .totals .pill.danger { color: var(--danger); }
  .panel-header .totals .pill.accent { color: var(--text); }
  .panel-header .totals .pill.accent::before { background: var(--accent); opacity: 1; }
  .panel-header .totals strong { font-weight: 600; color: var(--text); }

  /* Category callout — high-signal stat in the panel header */
  .panel-header .callout {
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--warn-soft);
    border-left: 3px solid var(--warn);
    border-radius: var(--r-sm);
    font-size: 12px;
    line-height: 1.45;
    color: var(--text);
  }
  .panel-header .callout svg { width: 14px; height: 14px; color: var(--warn); flex-shrink: 0; }
  .panel-header .callout strong { color: var(--text); font-weight: 600; }
  .panel-header .callout code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .panel-header .callout[hidden] { display: none !important; }

  /* ── Scan section ───────────────────────────────────────── */
  .scan-section { padding: 14px 24px 4px; }
  .scan-section h3 {
    margin: 18px 0 10px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .scan-section h3::before {
    content: "";
    width: 6px; height: 6px; border-radius: 999px;
    background: currentColor;
  }
  .scan-section h3.safe          { color: var(--safe); }
  .scan-section h3.probably_safe { color: var(--warn); }
  .scan-section h3.caution       { color: var(--danger); }
  .scan-section .group-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    line-height: 1.55;
    padding: 10px 12px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: var(--r-sm);
  }
  .scan-section .group-note.caution {
    background: var(--danger-soft);
    border-color: transparent;
    color: var(--text);
  }
  /* Largest-files filter + sort toolbar above each category's path table (v0.17.0). */
  .row-toolbar {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    padding: 8px 12px;
    margin: 0 0 12px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .row-toolbar[hidden] { display: none; }
  .row-toolbar .rt-group { display: inline-flex; align-items: center; gap: 4px; }
  .row-toolbar .rt-label { color: var(--text-faint); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 6px; }
  .row-toolbar .rt-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 3px 10px;
    font: inherit;
    cursor: pointer;
    transition: color var(--d-quick) var(--ease-out), border-color var(--d-quick) var(--ease-out), background var(--d-quick) var(--ease-out);
  }
  .row-toolbar .rt-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .row-toolbar .rt-btn.active {
    color: var(--accent);
    background: hsl(var(--accent-h, 175 60% 40%) / 0.10);
    border-color: var(--accent);
  }
  .row-toolbar .rt-btn.rt-dir { padding: 3px 8px; font-weight: 700; min-width: 26px; }

  .path-row.size-filtered { display: none; }

  .path-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px;
    font-size: 13px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: var(--r-sm);
    margin-bottom: 3px;
    transition: border-color var(--d-quick) var(--ease-out), background var(--d-quick) var(--ease-out);
  }
  .path-row:hover { border-color: var(--border-strong); }
  .path-row.missing { opacity: 0.4; }
  .path-row .name { flex: 1; min-width: 0; }
  .path-row .name strong { display: block; font-weight: 500; }
  .path-row .name code {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    display: block;
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .path-row .value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    min-width: 60px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── Actions ────────────────────────────────────────────── */
  .actions-section {
    padding: 4px 24px 24px;
  }
  .actions-section h3 {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 22px 0 12px;
  }
  .action-card {
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: var(--r-md);
    padding: 0;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color var(--d-quick) var(--ease-out);
  }
  .action-card:hover { border-color: var(--border-strong); }

  /* Cost banner — LIFTED to the top of the card */
  .action-card .cost {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 12px;
    color: var(--text);
    padding: 10px 14px;
    background: var(--warn-soft);
    border-left: 3px solid var(--warn);
    line-height: 1.5;
    transition: transform var(--d-quick) var(--spring);
  }
  .action-card:hover .cost { transform: translateX(1px); }
  .action-card .cost svg {
    width: 14px; height: 14px;
    color: var(--warn);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .action-card .cost .cost-text { flex: 1; min-width: 0; }
  .action-card .cost .cost-label {
    display: block;
    font-size: 10px; font-weight: 600;
    color: var(--warn);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .action-card .cost.sudo {
    background: var(--danger-soft);
    border-left-color: var(--danger);
  }
  .action-card .cost.sudo svg,
  .action-card .cost.sudo .cost-label { color: var(--danger); }

  .action-card .body {
    padding: 14px 16px;
  }
  .action-card .label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .action-card .desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.55;
  }
  .action-card button {
    appearance: none; border: none;
    background: var(--accent); color: white;
    font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 8px 16px; border-radius: var(--r-sm);
    cursor: pointer;
    margin-top: 12px;
    transition: background var(--d-quick) var(--ease-out), transform var(--d-instant) var(--ease-out);
  }
  .action-card button:hover:not(:disabled) { background: var(--accent-strong); }
  .action-card button:active:not(:disabled) { transform: scale(0.97); }
  .action-card button:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-card.informational { border-left: 3px solid var(--accent); }
  .action-card.informational button { background: transparent; color: var(--text); border: 1px solid var(--border-strong); }
  .action-card.informational button:hover:not(:disabled) { background: var(--bg-3); }

  /* ── Top actions (per-category) ─────────────────────────── */
  .top-actions {
    display: flex; gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .top-btn {
    appearance: none; border: 1px solid var(--border);
    background: var(--bg-3); color: var(--text);
    font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 8px 14px; border-radius: var(--r-sm);
    cursor: pointer;
    transition: border-color var(--d-quick) var(--ease-out),
                background var(--d-quick) var(--ease-out),
                transform var(--d-instant) var(--ease-out);
    flex: 1; min-width: 0;
    font-variant-numeric: tabular-nums;
  }
  .top-btn:hover:not(:disabled) { border-color: var(--accent); }
  .top-btn:active:not(:disabled) { transform: scale(0.97); }
  .top-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .top-btn.primary {
    background: var(--accent); color: white; border-color: transparent;
  }
  .top-btn.primary:hover:not(:disabled) { background: var(--accent-strong); }

  button.path-clean {
    appearance: none; border: 1px solid var(--border);
    background: var(--bg-2); color: var(--text-dim);
    font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: var(--r-sm);
    cursor: pointer;
    transition: border-color var(--d-quick) var(--ease-out),
                color var(--d-quick) var(--ease-out),
                background var(--d-quick) var(--ease-out);
    margin-left: 8px;
  }
  button.path-clean:hover:not(:disabled) {
    border-color: var(--danger);
    color: var(--danger);
    background: var(--danger-soft);
  }
  button.path-clean:disabled { opacity: 0.3; cursor: not-allowed; }
  .path-clean-placeholder { display: inline-block; min-width: 52px; }

  /* ── Output console ─────────────────────────────────────── */
  .output {
    margin-top: 18px;
    background: rgba(11,11,12,0.92);
    color: #F4F4F2;
    border-radius: var(--r-lg);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    transition: padding var(--d-normal) var(--ease-out), max-height var(--d-normal) var(--ease-out);
    max-height: 0;
    overflow: hidden;
  }
  .output.visible { padding: 16px 18px; max-height: 360px; overflow-y: auto; }
  .output .ok   { color: #22C55E; }
  .output .warn { color: #FBBF24; }
  .output .err  { color: #EF4444; }
  .output .dim  { color: #9B9BA3; }
  .output .out-line { display: block; }

  /* ── Version pill ───────────────────────────────────────── */
  .badge-btn {
    appearance: none; border: 1px solid transparent;
    background: transparent; color: inherit;
    font-family: inherit; font-size: 11px; font-variant-numeric: tabular-nums;
    padding: 5px 10px; border-radius: var(--r-pill);
    cursor: pointer;
    transition: all var(--d-quick) var(--ease-out);
  }
  .badge-btn:hover { background: var(--bg-3); border-color: var(--border); color: var(--text); }

  /* ── Modal ──────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(11,11,12,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  @media (prefers-color-scheme: dark) {
    .modal-backdrop { background: rgba(0,0,0,0.65); }
  }
  .modal-backdrop[hidden] { display: none; }
  .modal-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 720px;
    max-height: 85vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-card.confirm { max-width: 460px; }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { margin: 0; font-size: 16px; font-weight: 600; }
  .modal-close {
    appearance: none; border: none;
    background: transparent; color: var(--text-dim);
    font-size: 22px; line-height: 1;
    padding: 4px 10px; cursor: pointer;
    border-radius: var(--r-sm);
    transition: background var(--d-quick) var(--ease-out), color var(--d-quick) var(--ease-out);
  }
  .modal-close:hover { background: var(--bg-3); color: var(--text); }
  .modal-body {
    padding: 20px 24px 24px;
    overflow-y: auto;
    line-height: 1.55;
    font-size: 13px;
  }
  .modal-body h2 {
    font-size: 17px; font-weight: 700;
    margin: 28px 0 4px;
    color: var(--accent);
  }
  .modal-body h2:first-child { margin-top: 0; }
  .modal-body h3 {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 14px 0 6px;
  }
  .modal-body p { margin: 6px 0; }
  .modal-body ul { margin: 6px 0; padding-left: 22px; }
  .modal-body li { margin: 4px 0; }
  .modal-body code {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg-3);
    padding: 1px 6px;
    border-radius: var(--r-sm);
  }
  .modal-body strong { font-weight: 600; }
  .modal-body em { color: var(--text-dim); font-style: normal; }

  /* Confirm-modal specific */
  .confirm-body {
    padding: 18px 22px 22px;
  }
  .confirm-body .what {

<script type="module">
let M = null;
try {
  M = await import("https://cdn.jsdelivr.net/npm/motion@11.18.0/+esm");
} catch (e) {
  console.warn("[motion] CDN unavailable — falling back to instant state changes.", e);
}

const PRM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const safeAnimate = (target, keyframes, options) => {
  if (!M || PRM) return null;
  try { return M.animate(target, keyframes, options); } catch (e) { return null; }
};
const safeStagger = (delay) => (M && !PRM) ? M.stagger(delay) : 0;

const $  = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const fmt = (n, d=1) => Number(n).toFixed(d);

const TAB_ICONS = {

  "llms":     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>',
  "docker":   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 7.7c0-.6-.4-1.2-.8-1.5-.5-.3-1.1-.5-1.7-.5-.6 0-1.3.2-1.7.5-.4.3-.8.9-.8 1.5 0 .6.4 1.2.8 1.5.4.3 1.1.5 1.7.5.6 0 1.3-.2 1.7-.5.4-.3.8-.9.8-1.5z"/><path d="M2 12V8h4v4H2z"/><path d="M6 12V8h4v4H6z"/><path d="M10 12V8h4v4h-4z"/><path d="M14 12V8h4v4h-4z"/><path d="M6 16V12h4v4H6z"/><path d="M10 16V12h4v4h-4z"/><path d="M14 16V12h4v4h-4z"/><path d="M2 16h20v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2z"/></svg>',
  "apps":     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="14" x="3" y="6" rx="2"/><path d="M3 10h18"/><path d="M7 8h.01"/><path d="M10 8h.01"/></svg>',
  "creative": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>',
  "system":   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></svg>',

  "temp":     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>',
  "archives": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>',
};
const SUB_LABELS = {
  "llms-claude":       "Claude",
  "llms-cursor":       "Cursor",
  "llms-chatgpt":      "ChatGPT",
  "creative-adobe":    "Adobe",
  "creative-davinci":  "DaVinci Resolve",
  "creative-finalcut": "Final Cut Pro",
  "creative-logic":    "Logic Pro",
  "creative-blender":  "Blender",
  "creative-obs":      "OBS Studio",
};
function iconFor(tabId) { return TAB_ICONS[tabId] || ""; }
function stripLeadingGlyph(label) { return (label || "").replace(/^[\p{Extended_Pictographic}\p{Emoji}☀-➿]+\s*/u, "").trim() || label; }

let tabsState = {
  current: null,          // top-level tab id
  currentSub: {},         // tabId -> active sub-category id
  scans: {},              // catId -> last scan result
  allCategories: [],      // every real category id from /api/tabs
  tabsManifest: [],       // the raw /api/tabs response
  diskStatus: null,       // last /api/status
  history: null,          // last /api/report
  overviewAutoScanned: false,
};

// ── Status, history, hero ───────────────────────────────────
async function loadStatus() {
  const r = await fetch("/api/status"); const d = await r.json();
  tabsState.diskStatus = d;
  if (d.version) $("#version").textContent = `${d.version} · localhost`;
  paintHero();
}

async function loadHistory() {
  try {
    const r = await fetch("/api/report");
    if (!r.ok) return;
    const d = await r.json();
    tabsState.history = d;
    paintHistoryStrip();
  } catch (e) { /* no history yet */ }
}

function paintHero() {
  const free = $("#free-gb"), fill = $("#progress-fill"), label = $("#free-label");
  const d = tabsState.diskStatus;
  if (!free || !d) return;
  const oldVal = parseFloat(free.firstChild?.nodeValue || "");
  const newVal = d.free_gb;
  tweenHeroNumber(free, isNaN(oldVal) ? 0 : oldVal, newVal);
  free.classList.toggle("good",   d.free_gb >= 50);
  free.classList.toggle("warn",   d.free_gb >= 20 && d.free_gb < 50);
  free.classList.toggle("danger", d.free_gb < 20);
  safeAnimate(fill, { width: d.used_pct + "%" }, { duration: 0.6, easing: [0.22, 1, 0.36, 1] })
    || (fill.style.width = d.used_pct + "%");
  fill.classList.toggle("warn",   d.used_pct >= 75 && d.used_pct < 90);
  fill.classList.toggle("danger", d.used_pct >= 90);
  if (label) label.textContent = `${fmt(d.used_gb,0)} GB used of ${fmt(d.total_gb,0)} GB · ${fmt(d.used_pct,0)}%`;
}

function paintHistoryStrip() {
  const strip = $("#history-strip");
  const text  = $("#history-text");
  const d = tabsState.history;
  if (!strip || !text) return;
  if (!d || !d.real_runs) { strip.hidden = true; return; }
  text.innerHTML = `You've freed <strong>${fmt(d.total_freed_gb)} GB</strong> across <strong>${d.real_runs}</strong> run${d.real_runs === 1 ? "" : "s"}.`;
  strip.hidden = false;
}

function tweenHeroNumber(el, from, to) {
  if (!el?.firstChild || !isFinite(to)) return;
  // Always snap-set so the value is correct even if rAF gets throttled
  // (e.g. background tabs, headless browsers). Only animate when there's
  // meaningful interpolation distance and motion isn't disabled.
  if (!M || PRM || !isFinite(from) || Math.abs(to - from) < 0.05) {
    el.firstChild.nodeValue = fmt(to);
    return;
  }
  el.firstChild.nodeValue = fmt(to);  // snap as a baseline
  const start = performance.now();
  const dur = 600;
  const ease = t => 1 - Math.pow(1 - t, 3);
  function frame(now) {
    const t = Math.min(1, (now - start) / dur);
    const v = from + (to - from) * ease(t);
    el.firstChild.nodeValue = fmt(v);
    if (t < 1) requestAnimationFrame(frame);
    else el.firstChild.nodeValue = fmt(to);  // pin final value
  }
  requestAnimationFrame(frame);
}

// ── Tabs ────────────────────────────────────────────────────
async function loadTabs() {
  const r = await fetch("/api/tabs");
  const { tabs } = await r.json();
  tabsState.tabsManifest = tabs;

  // Derive the canonical category list (real categories only, no meta).
  const allCats = [];
  for (const t of tabs) {
    if (t.meta) continue;
    if (t.subcategories) allCats.push(...t.subcategories);
    else if (t.category) allCats.push(t.category);
  }
  tabsState.allCategories = allCats;

  // Render the left vertical nav.
  const nav = $("#vtabs");
  nav.innerHTML = `<div class="vnav-title">Categories</div>`;
  tabs.forEach((tab) => {
    const btn = document.createElement("button");
    btn.className = "vtab";
    btn.dataset.tab = tab.id;
    const label = stripLeadingGlyph(tab.label);
    btn.innerHTML = `${iconFor(tab.id)}<span class="vtab-text">${label}</span><span class="vtab-stat" id="vtab-stat-${tab.id}"></span><svg class="vtab-mini-donut" id="vtab-donut-${tab.id}" viewBox="0 0 32 32" aria-hidden="true" hidden><circle class="vtab-track" cx="16" cy="16" r="13"/></svg>`;
    btn.addEventListener("click", () => switchTab(tab.id));
    nav.appendChild(btn);
  });

  // Render the panels container.
  const panels = $("#panels");
  panels.innerHTML = "";
  tabs.forEach((tab) => {
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.dataset.panel = tab.id;
    panels.appendChild(panel);

    if (tab.meta && tab.id === "overview") {
      panel.appendChild(buildOverviewPanel());
    } else if (tab.subcategories) {
      // One sub-panel per subcategory, only one active at a time.
      const subPanels = document.createElement("div");
      subPanels.className = "panel-subs";
      // Optional mobile-bar (visible when right sidebar collapses on tablet/mobile).
      const mobileBar = document.createElement("div");
      mobileBar.className = "sub-mobile-bar";
      mobileBar.dataset.tabId = tab.id;
      tab.subcategories.forEach((sub, idx) => {
        const mbtn = document.createElement("button");
        mbtn.textContent = SUB_LABELS[sub] || sub;
        mbtn.dataset.sub = sub;
        if (idx === 0) mbtn.classList.add("active");
        mbtn.addEventListener("click", () => switchSubItem(tab.id, sub));
        mobileBar.appendChild(mbtn);
      });
      panel.appendChild(mobileBar);

      tab.subcategories.forEach((sub, idx) => {
        const sp = document.createElement("div");
        sp.className = "sub-panel" + (idx === 0 ? " active" : "");
        sp.dataset.subPanel = sub;
        subPanels.appendChild(sp);
        renderCategoryInto(sub, sp, { providerLabel: SUB_LABELS[sub] || sub });
        if (idx === 0) tabsState.currentSub[tab.id] = sub;
      });
      panel.appendChild(subPanels);
    } else if (tab.category) {
      renderCategoryInto(tab.category, panel);
    }
  });

  // Default to the Overview tab.
  switchTab("overview");
}

function switchTab(tabId) {
  const tab = tabsState.tabsManifest.find(t => t.id === tabId);
  if (!tab) return;
  tabsState.current = tabId;

  $$("#vtabs .vtab").forEach(b => b.classList.toggle("active", b.dataset.tab === tabId));
  $$(".panel").forEach(p => p.classList.toggle("active", p.dataset.panel === tabId));

  // Right sidebar: populate when the active tab has subcategories.
  const right = $("#sidebar-right");
  const grid  = $("#app-grid");
  if (tab.subcategories && tab.subcategories.length) {
    populateSubNav(tab);
    right.hidden = false;
    grid.classList.add("has-sub");
    grid.classList.remove("no-right");
  } else {
    right.hidden = true;
    grid.classList.remove("has-sub");
    grid.classList.add("no-right");
  }

  const entering = $(`.panel[data-panel="${tabId}"]`);
  if (entering) {
    safeAnimate(entering, { opacity: [0, 1], x: [6, 0] }, { duration: 0.22, easing: [0.22, 1, 0.36, 1] });
  }

  // Overview special: auto-scan everything on first activation.
  if (tabId === "overview" && !tabsState.overviewAutoScanned) {
    tabsState.overviewAutoScanned = true;
    scanEverything({ silent: true });
  }
}

function populateSubNav(tab) {
  const title = $("#vsubs-title");
  const list = $("#vsubs-list");
  title.textContent = stripLeadingGlyph(tab.label);
  list.innerHTML = "";
  const activeSub = tabsState.currentSub[tab.id] || tab.subcategories[0];
  tab.subcategories.forEach((sub) => {
    const btn = document.createElement("button");
    btn.className = "vtab" + (sub === activeSub ? " active" : "");
    btn.dataset.sub = sub;
    const cleanable = (tabsState.scans[sub]?.total_cleanable_gb || 0);
    btn.innerHTML = `<span class="vtab-text">${SUB_LABELS[sub] || sub}</span><span class="vtab-stat">${cleanable >= 0.01 ? fmt(cleanable) + ' GB' : ''}</span>`;
    btn.addEventListener("click", () => switchSubItem(tab.id, sub));
    list.appendChild(btn);
  });
}

function switchSubItem(tabId, subId) {
  tabsState.currentSub[tabId] = subId;
  const panel = $(`.panel[data-panel="${tabId}"]`);
  if (!panel) return;
  panel.querySelectorAll(".sub-panel").forEach(p => p.classList.toggle("active", p.dataset.subPanel === subId));
  panel.querySelectorAll(".sub-mobile-bar button").forEach(b => b.classList.toggle("active", b.dataset.sub === subId));
  $$("#vsubs-list .vtab").forEach(b => b.classList.toggle("active", b.dataset.sub === subId));
  const entering = panel.querySelector(`.sub-panel[data-sub-panel="${subId}"]`);
  if (entering) {
    safeAnimate(entering, { opacity: [0, 1], x: [6, 0] }, { duration: 0.22, easing: [0.22, 1, 0.36, 1] });
  }
}

// Per-category color palette for the disk-usage pie chart. Each top-level tab
// gets a distinct hue so a glance at the slices identifies the heavy categories.
const PIE_COLORS = {
  "xcode":     "#0F766E", // teal — accent
  "llms":      "#7C3AED", // violet
  "docker":    "#0EA5E9", // sky
  "apps":      "#F59E0B", // amber
  "browsers":  "#10B981", // emerald
  "downloads": "#F97316", // orange (v0.17.0)
  "creative":  "#EC4899", // pink
  "temp":      "#A3A3A3", // neutral (v0.17.0)
  "archives":  "#92400E", // brown (v0.17.0)
  "system":    "#64748B", // slate
};

// Remembered between renders so we can:
//  - spring slice angles from old → new when a scan completes (elevation C)
//  - render a fading ghost of the previous slice when a clean shrinks it (elevation D)
//  - tween the center number between renders
let pieLastState = { slices: [], grandTotal: 0 };
let pieCenterTween = null;
let pieAngleTween = null;

function renderPie() {
  const svg = $("#overview-pie");
  const legend = $("#pie-legend");
  const centerNum = $("#pie-center-num");
  if (!svg || !legend) return;

  // Collect per-tab totals (safe + opt-in + caution = what we've seen on disk).
  // Note: vanilla tabsState.scans[id] holds the raw scan object directly.
  const slices = [];
  let grandTotal = 0;
  for (const tab of tabsState.tabsManifest) {
    if (tab.meta) continue;
    let total = 0;
    let pathCount = 0;
    if (tab.subcategories) {
      for (const sub of tab.subcategories) {
        const s = tabsState.scans[sub];
        if (s) {
          total += (s.totals.safe || 0) + (s.totals.probably_safe || 0) + (s.totals.caution || 0);
          // scan.groups is {safe: {paths: [...]}, probably_safe: ..., caution: ...}
          for (const tier of ["safe", "probably_safe", "caution"]) {
            pathCount += (s.groups?.[tier]?.paths?.length || 0);
          }
        }
      }
    } else if (tab.category) {
      const s = tabsState.scans[tab.category];
      if (s) {
        total = (s.totals.safe || 0) + (s.totals.probably_safe || 0) + (s.totals.caution || 0);
        for (const tier of ["safe", "probably_safe", "caution"]) {
          pathCount += (s.groups?.[tier]?.paths?.length || 0);
        }
      }
    }
    slices.push({
      id: tab.id,
      label: stripLeadingGlyph(tab.label),
      total,
      pathCount,
      color: PIE_COLORS[tab.id] || "#888",
    });
    grandTotal += total;
  }

  // Tween the center number from the last value to this one.
  if (centerNum) {
    const from = pieLastState.grandTotal || 0;
    const to = grandTotal;
    if (pieCenterTween) { try { pieCenterTween.stop(); } catch {} pieCenterTween = null; }
    if (M && M.animate && !PRM && Math.abs(from - to) > 0.05) {
      const obj = { v: from };
      pieCenterTween = M.animate(obj, { v: to }, {
        duration: 0.55,
        easing: [0.22, 1, 0.36, 1],
        onUpdate: () => { centerNum.textContent = obj.v >= 0.01 ? fmt(obj.v) : "—"; },
      });
    } else {
      centerNum.textContent = grandTotal >= 0.01 ? fmt(grandTotal) : "—";
    }
  }

  // Empty state — thin grey placeholder ring.
  svg.innerHTML = "";
  if (grandTotal < 0.01) {
    svg.innerHTML = `<circle cx="50" cy="50" r="42" fill="none" stroke="hsl(0 0% 50% / 0.18)" stroke-width="2" />`;
    legend.innerHTML = renderLegendHTML(slices);
    wirePieInteractions();
    pieLastState = { slices, grandTotal };
    return;
  }

  // ── Ghost slices (elevation D) ─────────────────────────────────────────
  // If the previous total was bigger than the new one, something got cleaned.
  // Render the previous slice layout as low-opacity ghosts on a layer below
  // the real slices, then fade them out over ~500ms. Visceral confirmation.
  let ghostGroup = null;
  if (pieLastState.grandTotal > grandTotal + 0.05) {
    ghostGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    ghostGroup.setAttribute("class", "pie-ghosts");
    let gAngle = 0;
    for (const s of pieLastState.slices) {
      if (s.total <= 0) continue;
      const frac = s.total / pieLastState.grandTotal;
      const end = gAngle + frac * Math.PI * 2;
      const el = document.createElementNS("http://www.w3.org/2000/svg", "path");
      el.setAttribute("d", arcPath(50, 50, 42, gAngle, end));
      el.setAttribute("fill", s.color);
      el.setAttribute("opacity", "0.55");
      el.style.transition = "opacity 0.55s cubic-bezier(0.22,1,0.36,1)";
      ghostGroup.appendChild(el);
      gAngle = end;
    }
    svg.appendChild(ghostGroup);
    // Fade out on the next frame so the transition catches the change.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (!ghostGroup) return;
        for (const child of ghostGroup.children) child.setAttribute("opacity", "0");
      });
    });
    // Reap after the transition finishes.
    setTimeout(() => { if (ghostGroup && ghostGroup.parentNode) ghostGroup.parentNode.removeChild(ghostGroup); }, 700);
  }

  // ── Real slices (with spring on angle change for elevation C) ──────────
  // Build a `<g class="pie-slices">` so we can group-manipulate as needed.
  const sliceGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
  sliceGroup.setAttribute("class", "pie-slices");
  svg.appendChild(sliceGroup);

  // Determine target end-angles per slice (cumulative).
  const nonZeroSlices = slices.filter((s) => s.total > 0);
  const targetAngles = [];
  let cumulative = 0;
  for (const s of nonZeroSlices) {
    const frac = s.total / grandTotal;
    cumulative += frac * Math.PI * 2;
    targetAngles.push(cumulative);
  }

  // Special case: a single slice owns 100%. Drawing a full sweep with one arc
  // path produces start === end (no visible wedge in most renderers). Use a
  // <circle> instead — same visual, no math edge case.
  if (nonZeroSlices.length === 1) {
    const only = nonZeroSlices[0];
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", "50"); c.setAttribute("cy", "50"); c.setAttribute("r", "42");
    c.setAttribute("fill", only.color);
    c.setAttribute("data-tab", only.id);
    c.style.cursor = "pointer";
    c.addEventListener("click", (e) => pieSliceClick(c, only.id, e));
    c.addEventListener("mouseenter", (e) => showPieTooltip(only, e));
    c.addEventListener("mousemove", (e) => movePieTooltip(e));
    c.addEventListener("mouseleave", hidePieTooltip);
    sliceGroup.appendChild(c);
  } else {
    // Build initial paths at the PREVIOUS layout, then tween them to the new
    // target. Falls back to instant snap if Motion is unavailable or PRM.
    const prevAngles = computePrevAngles(slices, pieLastState);
    let startAngle = 0;
    for (let i = 0; i < nonZeroSlices.length; i++) {
      const slice = nonZeroSlices[i];
      const targetEnd = targetAngles[i];
      const prevStart = prevAngles[i].start;
      const prevEnd = prevAngles[i].end;
      const el = document.createElementNS("http://www.w3.org/2000/svg", "path");
      el.setAttribute("d", arcPath(50, 50, 42, prevStart, prevEnd));
      el.setAttribute("fill", slice.color);
      el.setAttribute("data-tab", slice.id);
      el.style.cursor = "pointer";
      el.style.transition = "transform 0.22s cubic-bezier(0.22,1,0.36,1)";
      el.style.transformOrigin = "50px 50px";
      el.addEventListener("click", (e) => pieSliceClick(el, slice.id, e));
      el.addEventListener("mouseenter", (e) => showPieTooltip(slice, e));
      el.addEventListener("mousemove", (e) => movePieTooltip(e));
      el.addEventListener("mouseleave", hidePieTooltip);
      sliceGroup.appendChild(el);
      el.__sliceMeta = { startAngleSnapshot: startAngle, targetEnd };
      startAngle = targetEnd;
    }
    // Spring-tween: animate every slice end-angle from prev → target together.
    if (pieAngleTween) { try { pieAngleTween.stop(); } catch {} pieAngleTween = null; }
    if (M && M.animate && !PRM) {
      const obj = { t: 0 };
      pieAngleTween = M.animate(obj, { t: 1 }, {
        duration: 0.6,
        easing: [0.22, 1, 0.36, 1],
        onUpdate: () => {
          let acc = 0;
          for (let i = 0; i < nonZeroSlices.length; i++) {
            const el = sliceGroup.children[i];
            if (!el) continue;
            const prev = prevAngles[i];
            const target = targetAngles[i];
            const prevSpan = prev.end - prev.start;
            const targetSpan = target - (i === 0 ? 0 : targetAngles[i - 1]);
            const span = prevSpan + (targetSpan - prevSpan) * obj.t;
            el.setAttribute("d", arcPath(50, 50, 42, acc, acc + span));
            acc += span;
          }
        },
      });
    }
  }

  // Donut hole — bg-tinted so the center label reads cleanly.
  const hole = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  hole.setAttribute("cx", "50");
  hole.setAttribute("cy", "50");
  hole.setAttribute("r", "22");
  hole.setAttribute("fill", "var(--bg-2)");
  hole.style.pointerEvents = "none";
  svg.appendChild(hole);

  // Legend.
  legend.innerHTML = renderLegendHTML(slices);
  wirePieInteractions();
  pieLastState = { slices: slices.map((s) => ({ ...s })), grandTotal };
}

function renderLegendHTML(slices) {
  return slices
    .map((s) => `<span class="legend-item" data-tab="${s.id}"><span class="legend-dot" style="background:${s.color}"></span><span class="legend-name">${s.label}</span><span class="legend-gb">${s.total >= 0.01 ? fmt(s.total) + " GB" : "—"}</span></span>`)
    .join("");
}

// Map this render's slice order to the previous render's angles, so we can
// interpolate from "where they were" to "where they should be." If the same
// slice id existed previously, use its angles; otherwise start it collapsed
// (start === end) at the current insertion point so it grows out of nothing.
function computePrevAngles(currentSlices, prev) {
  const nonZero = currentSlices.filter((s) => s.total > 0);
  const result = [];
  // Cumulative angles for the previous layout, keyed by slice id.
  const prevById = {};
  if (prev && prev.grandTotal > 0.01) {
    let a = 0;
    for (const s of prev.slices) {
      if (s.total <= 0) continue;
      const frac = s.total / prev.grandTotal;
      const end = a + frac * Math.PI * 2;
      prevById[s.id] = { start: a, end };
      a = end;
    }
  }
  let cursor = 0;
  for (const s of nonZero) {
    if (prevById[s.id]) {
      result.push({ start: prevById[s.id].start, end: prevById[s.id].end });
    } else {
      // New slice — collapse it at the cursor so it grows in place.
      result.push({ start: cursor, end: cursor });
    }
    cursor += result[result.length - 1].end - result[result.length - 1].start;
  }
  return result;
}

// ── Click-and-drill (elevation B) ─────────────────────────────────────────
// Briefly "explode" the clicked slice outward via transform: scale() before
// the tab transition kicks in. Reads as cause-and-effect.
function pieSliceClick(el, tabId, ev) {
  if (PRM) {
    switchTab(tabId);
    return;
  }
  el.style.transformOrigin = "50px 50px";
  el.style.transform = "scale(1.08)";
  setTimeout(() => {
    el.style.transform = "";
    switchTab(tabId);
  }, 160);
}

// ── Pie hover tooltip (elevation A) ───────────────────────────────────────
function showPieTooltip(slice, ev) {
  let tip = $("#pie-tooltip");
  if (!tip) {
    tip = document.createElement("div");
    tip.id = "pie-tooltip";
    tip.className = "pie-tooltip";
    document.body.appendChild(tip);
  }
  const paths = slice.pathCount >= 1 ? ` · ${slice.pathCount} path${slice.pathCount === 1 ? "" : "s"}` : "";
  tip.innerHTML = `<span class="pie-tooltip-dot" style="background:${slice.color}"></span><strong>${slice.label}</strong> · ${slice.total >= 0.01 ? fmt(slice.total) + " GB" : "—"}${paths}`;
  tip.style.opacity = "1";
  movePieTooltip(ev);
}
function movePieTooltip(ev) {
  const tip = $("#pie-tooltip");
  if (!tip) return;
  const x = ev.clientX + 14;
  const y = ev.clientY + 14;
  tip.style.transform = `translate(${x}px, ${y}px)`;
}
function hidePieTooltip() {
  const tip = $("#pie-tooltip");
  if (tip) tip.style.opacity = "0";
}

function wirePieInteractions() {
  $$("#pie-legend .legend-item").forEach((el) => {
    el.addEventListener("click", () => {
      const id = el.dataset.tab;
      if (id) switchTab(id);
    });
  });
}

// SVG arc helper. Angles in radians, 0 = top, positive = clockwise (because the
// SVG is rotated -90deg via transform). For our purposes the rotation+angle math
// works out so the slices read clockwise starting from 12 o'clock.
function arcPath(cx, cy, r, startAngle, endAngle) {
  const sx = cx + r * Math.cos(startAngle);
  const sy = cy + r * Math.sin(startAngle);
  const ex = cx + r * Math.cos(endAngle);
  const ey = cy + r * Math.sin(endAngle);
  const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;
  return `M ${cx} ${cy} L ${sx} ${sy} A ${r} ${r} 0 ${largeArc} 1 ${ex} ${ey} Z`;
}

function renderOverviewGrid() {
  const grid = $("#overview-grid");
  if (!grid) return;
  grid.innerHTML = "";
  // Pie refresh follows the same lifecycle as the cards — both consume scans.
  // Guard against pie errors so the cards still render even if Motion's API
  // signature mismatches in an old browser.
  try { renderPie(); } catch (e) { console.warn("[pie] renderPie failed:", e); }

  // Build one card per top-level tab (skip the meta Overview itself).
  for (const tab of tabsState.tabsManifest) {
    if (tab.meta) continue;

    let cleanable = 0, safe = 0, optin = 0, caution = 0;
    let tagline = "";
    let scanned = false;

    if (tab.subcategories) {
      for (const sub of tab.subcategories) {
        const s = tabsState.scans[sub];
        if (s) {
          scanned = true;
          cleanable += s.total_cleanable_gb || 0;
          safe      += s.totals.safe || 0;
          optin     += s.totals.probably_safe || 0;
          caution   += s.totals.caution || 0;
        }
      }
      tagline = `${tab.subcategories.length} sub-tools`;
    } else if (tab.category) {
      const s = tabsState.scans[tab.category];
      if (s) {
        scanned = true;
        cleanable = s.total_cleanable_gb || 0;
        safe = s.totals.safe || 0;
        optin = s.totals.probably_safe || 0;
        caution = s.totals.caution || 0;
        tagline = stripLeadingGlyph(s.tagline || "");
      }
    }

    // Two prominent tier numbers so the math is transparent:
    //   sum of all cards' "safe" lines  == "Clean ALL safe" button GB
    //   sum of all cards' "opt-in" lines == "Clean ALL opt-in" button GB
    // Caution is a smaller informational note since the dashboard never
    // auto-cleans caution-tier paths.
    let statsHtml = "";
    if (!scanned) {
      statsHtml = `<div class="tier-stat zero">scanning…</div>`;
    } else if (safe < 0.001 && optin < 0.001 && caution < 0.001) {
      statsHtml = `<div class="tier-stat zero">nothing to clean</div>`;
    } else {
      statsHtml =
        `<div class="tier-stat safe"><span class="num">${fmt(safe)}</span><span class="unit">GB safe</span></div>` +
        `<div class="tier-stat warn"><span class="num">${fmt(optin)}</span><span class="unit">GB opt-in</span></div>` +
        (caution >= 0.01
          ? `<div class="tier-stat caution-small"><span class="num">${fmt(caution)}</span>&nbsp;GB caution (surface only)</div>`
          : "");
    }

    const card = document.createElement("button");
    card.className = "overview-card";
    card.dataset.openTab = tab.id;
    card.innerHTML = `
      <div class="head">${iconFor(tab.id)}<span class="name">${stripLeadingGlyph(tab.label)}</span></div>
      <div class="tagline">${tagline || "—"}</div>
      ${statsHtml}
      <div class="open-hint">Open <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></div>
    `;
    card.addEventListener("click", () => switchTab(tab.id));
    grid.appendChild(card);
  }
}

function updateVtabStats() {
  // Per-tab cleanable-GB shown next to the left-nav label + a tiny donut that
  // visualises the safe/opt-in/caution breakdown for the tab (elevation H).
  for (const tab of tabsState.tabsManifest) {
    if (tab.meta) continue;
    const el = $(`#vtab-stat-${tab.id}`);
    if (!el) continue;
    let cleanable = 0;
    let safe = 0, optin = 0, caution = 0;
    if (tab.subcategories) {
      for (const sub of tab.subcategories) {
        const s = tabsState.scans[sub];
        if (s) {
          cleanable += s.total_cleanable_gb || 0;
          safe += s.totals.safe || 0;
          optin += s.totals.probably_safe || 0;
          caution += s.totals.caution || 0;
        }
      }
    } else if (tab.category) {
      const s = tabsState.scans[tab.category];
      if (s) {
        cleanable = s.total_cleanable_gb || 0;
        safe = s.totals.safe || 0;
        optin = s.totals.probably_safe || 0;
        caution = s.totals.caution || 0;
      }
    }
    // v0.17.1: show every tab's total recoverable footprint (safe + opt-in +
    // caution). Previously this displayed only `total_cleanable_gb` (safe +
    // opt-in), which blanked tabs like Docker / Browsers / Apps / Downloads /
    // Creative / Temp / Archives whenever their safe-tier reclaim was zero —
    // even when they had multi-GB caution-tier candidates (Docker.raw etc).
    // Show a number once the tab has been scanned, even if it's "0.0 GB", so
    // every row in the sidebar has a number column.
    const total = safe + optin + caution;
    const scanned = !!(tab.subcategories
      ? tab.subcategories.some((sub) => tabsState.scans[sub])
      : tab.category && tabsState.scans[tab.category]);
    el.textContent = scanned ? `${fmt(total)} GB` : "";
    paintVtabMiniDonut(tab.id, safe, optin, caution);
  }
  // Also refresh the right-sub-nav stats if it's open.
  const cur = tabsState.tabsManifest.find(t => t.id === tabsState.current);
  if (cur?.subcategories) populateSubNav(cur);
}

// Paint a tiny 32x32-viewBox donut next to a vtab label. Three concentric arcs:
// safe (green) / opt-in (amber) / caution (red), drawn as stroke-dasharray
// segments around a 13-radius circle (circumference ≈ 81.7). Hidden when the
// tab has zero scanned data so we don't show six grey rings on first load.
function paintVtabMiniDonut(tabId, safe, optin, caution) {
  const svg = $(`#vtab-donut-${tabId}`);
  if (!svg) return;
  const total = safe + optin + caution;
  if (total < 0.01) {
    svg.setAttribute("hidden", "");
    return;
  }
  // SVG ignores the `.hidden` JS property in some browsers — use the
  // attribute API directly so it's reliably gone once we have data.
  svg.removeAttribute("hidden");
  // Strip any old arcs (keep the track circle which is index 0).
  while (svg.children.length > 1) svg.removeChild(svg.lastChild);
  const r = 13;
  const C = 2 * Math.PI * r;
  let offset = 0;
  const SEG_COLOR = { safe: "var(--safe)", optin: "var(--warn)", caution: "var(--danger)" };
  const segments = [
    { v: safe, color: SEG_COLOR.safe },
    { v: optin, color: SEG_COLOR.optin },
    { v: caution, color: SEG_COLOR.caution },
  ];
  for (const seg of segments) {
    if (seg.v <= 0) continue;
    const frac = seg.v / total;
    const len = frac * C;
    const arc = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    arc.setAttribute("class", "vtab-arc");
    arc.setAttribute("cx", "16");
    arc.setAttribute("cy", "16");
    arc.setAttribute("r", String(r));
    arc.setAttribute("stroke", seg.color);
    arc.setAttribute("stroke-dasharray", `${len} ${C - len}`);
    arc.setAttribute("stroke-dashoffset", String(-offset));
    arc.setAttribute("transform", "rotate(-90 16 16)");
    svg.appendChild(arc);
    offset += len;
  }
}
