<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cleanup Hub</title>
<style>
  :root {
    color-scheme: light dark;

    /* Neutrals — warm grayscale */
    --bg-1: #FAFAF7;
    --bg-2: rgba(255,255,255,0.78);
    --bg-3: rgba(255,255,255,0.55);
    --border: rgba(11,11,12,0.08);
    --border-2: rgba(11,11,12,0.05);
    --border-strong: rgba(11,11,12,0.14);
    --text: #171719;
    --text-dim: #5C5C66;
    --text-faint: #9999A3;

    /* Accent — deep teal (precision instrument) */
    --accent: #0F766E;
    --accent-strong: #115E59;
    --accent-soft: rgba(15,118,110,0.10);

    /* Semantic — safety tiers (1:1 with cleaners.py) */
    --safe: #16A34A;
    --safe-soft: rgba(22,163,74,0.10);
    --warn: #D97706;
    --warn-soft: rgba(217,119,6,0.10);
    --danger: #B91C1C;
    --danger-soft: rgba(185,28,28,0.10);

    /* Legacy aliases — kept so older selectors keep working until fully renamed */
    --green: var(--safe);
    --orange: var(--warn);
    --red: var(--danger);

    /* Typography */
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --mono: var(--font-mono);

    /* Radii */
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 18px;
    --r-pill: 999px;
    --radius: var(--r-lg);
    --radius-sm: 8px;

    /* Elevation */
    --shadow-sm: 0 1px 2px rgba(11,11,12,0.04), 0 2px 8px rgba(11,11,12,0.03);
    --shadow-md: 0 2px 4px rgba(11,11,12,0.05), 0 8px 24px rgba(11,11,12,0.06);
    --shadow-lg: 0 8px 16px rgba(11,11,12,0.10), 0 24px 64px rgba(11,11,12,0.18);
    --shadow: var(--shadow-sm);

    /* Motion */
    --d-instant: 80ms;
    --d-quick: 160ms;
    --d-normal: 220ms;
    --d-slow: 600ms;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    --sidebar-w-left: 220px;
    --sidebar-w-right: 220px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-1: #0B0B0C;
      --bg-2: rgba(22,22,24,0.78);
      --bg-3: rgba(34,34,38,0.55);
      --border: rgba(255,255,255,0.10);
      --border-2: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.16);
      --text: #F4F4F2;
      --text-dim: #9B9BA3;
      --text-faint: #6C6C76;

      --accent: #2DD4BF;
      --accent-strong: #5EEAD4;
      --accent-soft: rgba(45,212,191,0.12);

      --safe: #22C55E;
      --safe-soft: rgba(34,197,94,0.14);
      --warn: #FBBF24;
      --warn-soft: rgba(251,191,36,0.14);
      --danger: #EF4444;
      --danger-soft: rgba(239,68,68,0.14);

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 2px 4px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 16px rgba(0,0,0,0.5), 0 24px 64px rgba(0,0,0,0.7);
      --shadow: var(--shadow-sm);
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-sans);
    background: var(--bg-1);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    min-height: 100vh;
    background-image:
      radial-gradient(at 20% 0%,   rgba(15,118,110,0.07) 0, transparent 50%),
      radial-gradient(at 80% 100%, rgba(22,163,74,0.05)  0, transparent 50%);
    padding: 28px 24px 96px;
  }
  @media (prefers-color-scheme: dark) {
    body {
      background-image:
        radial-gradient(at 20% 0%,   rgba(45,212,191,0.08) 0, transparent 50%),
        radial-gradient(at 80% 100%, rgba(34,197,94,0.05)  0, transparent 50%);
    }
  }
  .app-shell { max-width: 1280px; margin: 0 auto; }

  ::selection { background: var(--accent-soft); color: var(--accent-strong); }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

  /* ── Header ──────────────────────────────────────────────── */
  header.app-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  header.app-header .logo {
    width: 26px; height: 26px;
    color: var(--accent);
    flex-shrink: 0;
  }
  header.app-header h1 {
    margin: 0;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  header.app-header .badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }

  /* ── Three-column grid ──────────────────────────────────── */
  .app-grid {
    display: grid;
    grid-template-columns: var(--sidebar-w-left) 1fr var(--sidebar-w-right);
    gap: 18px;
    align-items: start;
  }
  .app-grid.no-right {
    grid-template-columns: var(--sidebar-w-left) 1fr;
  }
  .sidebar-left, .sidebar-right {
    position: sticky;
    top: 20px;
    align-self: start;
  }
  .viewport { min-width: 0; }

  /* ── Card ───────────────────────────────────────────────── */
  .card {
    background: var(--bg-2);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card.elevated { box-shadow: var(--shadow-md); }

  /* ── Vertical tab nav (left + right sidebars) ───────────── */
  .vnav {
    background: var(--bg-2);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 6px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .vnav .vnav-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    padding: 8px 12px 4px;
  }
  .vnav .vtab {
    appearance: none;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    padding: 9px 12px 9px 11px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: background var(--d-quick) var(--ease-out),
                color var(--d-quick) var(--ease-out),
                border-left-color var(--d-quick) var(--ease-out);
    display: flex; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  .vnav .vtab svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-faint); transition: color var(--d-quick) var(--ease-out); }
  .vnav .vtab:hover { color: var(--text); background: var(--bg-3); }
  .vnav .vtab.active {
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-left-color: var(--accent);
  }
  .vnav .vtab.active svg { color: var(--accent); }
  .vnav .vtab .vtab-stat {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .vnav .vtab.active .vtab-stat { color: var(--accent); }

  /* Compact variant for right sub-nav */
  .sidebar-right .vnav .vtab { font-size: 12px; padding: 8px 12px 8px 11px; }
  .sidebar-right .vnav .vtab svg { width: 14px; height: 14px; }

  /* ── Panel framework ────────────────────────────────────── */
  .panel { display: none; }
  .panel.active { display: block; }
  .sub-panel { display: none; }
  .sub-panel.active { display: block; }

  /* ── Overview 3-pane top: hero · pie · terminal ─────────── */
  .overview-top {
    display: grid;
    grid-template-columns: 1fr 0.92fr 1.05fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .overview-top .pane {
    background: var(--bg-2);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 280px;
  }
  .overview-top .pane.pane-hero { box-shadow: var(--shadow-md); }
  .overview-top .pane-title {
    padding: 12px 16px 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  /* Hero pane reuses overview-hero internals — just remove margin since the
     pane handles its own border + bg. */
  .overview-top .pane-hero .overview-hero {
    border: none; background: transparent; box-shadow: none;
    border-radius: 0;
    margin-bottom: 0;
    padding: 28px 24px 22px;
  }
  /* Pie pane */
  .pie-wrap {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 4px 14px 14px;
    position: relative;
  }
  .pie-svg {
    width: 168px; height: 168px;
    transform: rotate(-90deg);
  }
  .pie-svg path {
    transition: opacity var(--d-quick) var(--ease-out);
  }
  .pie-svg path.empty { fill: var(--border); }
  .pie-center-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, calc(-50% + 8px));
    text-align: center;
    pointer-events: none;
  }
  .pie-center-label .num {
    font-size: 22px; font-weight: 700; letter-spacing: -0.015em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .pie-center-label .unit { display: block; font-size: 9px; color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
  .pie-legend {
    margin-top: 10px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 12px;
    width: 100%;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .pie-legend .legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background var(--d-quick) var(--ease-out);
  }
  .pie-legend .legend-item:hover { background: var(--bg-3); color: var(--text); }
  .pie-legend .legend-dot {
    width: 8px; height: 8px; border-radius: 999px;
    flex-shrink: 0;
  }
  .pie-legend .legend-name { flex: 1; }
  .pie-legend .legend-gb { color: var(--text); font-weight: 600; }

  /* Terminal pane (always visible variant) */
  .terminal-pane {
    flex: 1;
    display: flex; flex-direction: column;
    background: rgba(11,11,12,0.92);
    color: #F4F4F2;
    margin: 0 12px 12px;
    border-radius: var(--r-sm);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .terminal-pane .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 180px;
  }
  .terminal-pane .terminal-idle {
    color: #6B6B73;
    font-style: italic;
  }
  .terminal-pane .terminal-body .out-line { display: block; }
  .terminal-pane .terminal-body .ok   { color: #22C55E; }
  .terminal-pane .terminal-body .warn { color: #FBBF24; }
  .terminal-pane .terminal-body .err  { color: #EF4444; }
  .terminal-pane .terminal-body .dim  { color: #9B9BA3; }

  @media (max-width: 1100px) {
    .overview-top { grid-template-columns: 1fr 1fr; }
    .overview-top .pane-terminal { grid-column: 1 / -1; min-height: 180px; }
  }
  @media (max-width: 720px) {
    .overview-top { grid-template-columns: 1fr; }
    .overview-top .pane-terminal { grid-column: auto; }
  }

  /* ── Overview tab ───────────────────────────────────────── */
  .overview-hero {
    padding: 36px 32px 26px;
    text-align: center;
    margin-bottom: 14px;
  }
  .overview-hero .free {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
    transition: color var(--d-normal) var(--ease-out);
    will-change: transform;
  }
  .overview-hero .free .unit { font-size: 26px; font-weight: 500; color: var(--text-dim); margin-left: 6px; letter-spacing: -0.01em; }
  .overview-hero .free.good   { color: var(--safe); }
  .overview-hero .free.warn   { color: var(--warn); }
  .overview-hero .free.danger { color: var(--danger); }
  .overview-hero .label {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .overview-hero .progress-track {
    margin-top: 20px;
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .overview-hero .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width var(--d-slow) var(--ease-out), background var(--d-normal) var(--ease-out);
  }
  .overview-hero .progress-fill.warn   { background: var(--warn); }
  .overview-hero .progress-fill.danger { background: var(--danger); }
  .overview-hero .promise {
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .overview-hero .promise svg { width: 12px; height: 12px; color: var(--safe); }

  .history-strip {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: var(--r-pill);
    font-variant-numeric: tabular-nums;
  }
  .history-strip strong { color: var(--text); font-weight: 600; }
  .history-strip svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }
  .history-strip[hidden] { display: none !important; }

  .global-actions {
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .ga-row {
    display: flex; gap: 10px;
    flex-wrap: wrap;
  }
  .ga-btn {
    appearance: none; border: 1px solid var(--border);
    background: var(--bg-3); color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 11px 16px; border-radius: var(--r-md);
    cursor: pointer;
    transition: border-color var(--d-quick) var(--ease-out),
                background var(--d-quick) var(--ease-out),
                transform var(--d-instant) var(--ease-out);
    flex: 1; min-width: 0;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ga-btn svg { width: 14px; height: 14px; }
  .ga-btn:hover:not(:disabled) { border-color: var(--accent); }
  .ga-btn:active:not(:disabled) { transform: scale(0.98); }
  .ga-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .ga-btn.primary {
    background: var(--accent);
    color: white;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(15,118,110,0.20);
  }
  .ga-btn.primary:hover:not(:disabled) {
    background: var(--accent-strong);
    box-shadow: 0 4px 14px rgba(15,118,110,0.30);
  }
  .ga-hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.55;
    font-variant-numeric: tabular-nums;
  }
  .ga-hint strong { color: var(--text); font-weight: 600; }

  /* Overview summary grid */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .overview-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color var(--d-quick) var(--ease-out),
                transform var(--d-instant) var(--ease-out);
    text-align: left;
    appearance: none;
    font-family: inherit;
    color: inherit;
    width: 100%;
    box-shadow: var(--shadow-sm);
  }
  .overview-card:hover { border-color: var(--accent); }
  .overview-card:active { transform: scale(0.99); }
  .overview-card .head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .overview-card .head svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
  .overview-card .head .name { font-size: 14px; font-weight: 600; letter-spacing: -0.005em; }
  .overview-card .tagline {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  /* Per-tier stats — stacked so the sum across cards matches the "Clean ALL"
     buttons. Safe + opt-in are prominent; caution is a smaller informational
     note since the dashboard never auto-deletes caution-tier paths. */
  .overview-card .tier-stat {
    display: flex; align-items: baseline; gap: 6px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.25;
  }
  .overview-card .tier-stat .num { font-size: 22px; }
  .overview-card .tier-stat .unit { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .overview-card .tier-stat.safe { color: var(--safe); }
  .overview-card .tier-stat.warn { color: var(--warn); }
  .overview-card .tier-stat.zero {
    color: var(--text-faint);
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
  }
  .overview-card .tier-stat.caution-small {
    margin-top: 6px;
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 500;
  }
  .overview-card .tier-stat.caution-small .num { font-size: 11px; font-weight: 600; }
  .overview-card .tier-stat.caution-small::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--danger);
    opacity: 0.6;
    margin-right: 4px;
  }
  .overview-card .open-hint {
    display: flex; justify-content: flex-end; align-items: center; gap: 4px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-faint);
    transition: color var(--d-quick) var(--ease-out);
  }
  .overview-card:hover .open-hint { color: var(--accent); }
  .overview-card .open-hint svg { width: 12px; height: 12px; }

  /* ── Panel header (per-category) ────────────────────────── */
  .panel-header {
    padding: 20px 24px 18px;
    border-bottom: 1px solid var(--border-2);
  }
  .panel-header h2 {
    margin: 0;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .panel-header h2 .cat-icon { color: var(--accent); }
  .panel-header h2 .cat-icon svg { width: 16px; height: 16px; }
  .panel-header .tagline {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.5;
  }
  .panel-header .totals {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }
  .panel-header .totals .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 0;
  }
  .panel-header .totals .pill::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 999px;
    background: currentColor;
    opacity: 0.6;
  }
  .panel-header .totals .pill.safe   { color: var(--safe); }
  .panel-header .totals .pill.warn   { color: var(--warn); }
  .panel-header .totals .pill.danger { color: var(--danger); }
  .panel-header .totals .pill.accent { color: var(--text); }
  .panel-header .totals .pill.accent::before { background: var(--accent); opacity: 1; }
  .panel-header .totals strong { font-weight: 600; color: var(--text); }

  /* Category callout — high-signal stat in the panel header */
  .panel-header .callout {
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--warn-soft);
    border-left: 3px solid var(--warn);
    border-radius: var(--r-sm);
    font-size: 12px;
    line-height: 1.45;
    color: var(--text);
  }
  .panel-header .callout svg { width: 14px; height: 14px; color: var(--warn); flex-shrink: 0; }
  .panel-header .callout strong { color: var(--text); font-weight: 600; }
  .panel-header .callout code {
    font-family: var(--mono);

function iconFor(tabId) { return TAB_ICONS[tabId] || ""; }
function stripLeadingGlyph(label) { return (label || "").replace(/^[\p{Extended_Pictographic}\p{Emoji}☀-➿]+\s*/u, "").trim() || label; }

let tabsState = {
  current: null,          // top-level tab id
  currentSub: {},         // tabId -> active sub-category id
  scans: {},              // catId -> last scan result
  allCategories: [],      // every real category id from /api/tabs
  tabsManifest: [],       // the raw /api/tabs response
  diskStatus: null,       // last /api/status
  history: null,          // last /api/report
  overviewAutoScanned: false,
};

// ── Status, history, hero ───────────────────────────────────
async function loadStatus() {
  const r = await fetch("/api/status"); const d = await r.json();
  tabsState.diskStatus = d;
  if (d.version) $("#version").textContent = `${d.version} · localhost`;
  paintHero();
}

async function loadHistory() {
  try {
    const r = await fetch("/api/report");
    if (!r.ok) return;
    const d = await r.json();
    tabsState.history = d;
    paintHistoryStrip();
  } catch (e) { /* no history yet */ }
}

function paintHero() {
  const free = $("#free-gb"), fill = $("#progress-fill"), label = $("#free-label");
  const d = tabsState.diskStatus;
  if (!free || !d) return;
  const oldVal = parseFloat(free.firstChild?.nodeValue || "");
  const newVal = d.free_gb;
  tweenHeroNumber(free, isNaN(oldVal) ? 0 : oldVal, newVal);
  free.classList.toggle("good",   d.free_gb >= 50);
  free.classList.toggle("warn",   d.free_gb >= 20 && d.free_gb < 50);
  free.classList.toggle("danger", d.free_gb < 20);
  safeAnimate(fill, { width: d.used_pct + "%" }, { duration: 0.6, easing: [0.22, 1, 0.36, 1] })
    || (fill.style.width = d.used_pct + "%");
  fill.classList.toggle("warn",   d.used_pct >= 75 && d.used_pct < 90);
  fill.classList.toggle("danger", d.used_pct >= 90);
  if (label) label.textContent = `${fmt(d.used_gb,0)} GB used of ${fmt(d.total_gb,0)} GB · ${fmt(d.used_pct,0)}%`;
}

function paintHistoryStrip() {
  const strip = $("#history-strip");
  const text  = $("#history-text");
  const d = tabsState.history;
  if (!strip || !text) return;
  if (!d || !d.real_runs) { strip.hidden = true; return; }
  text.innerHTML = `You've freed <strong>${fmt(d.total_freed_gb)} GB</strong> across <strong>${d.real_runs}</strong> run${d.real_runs === 1 ? "" : "s"}.`;
  strip.hidden = false;
}

function tweenHeroNumber(el, from, to) {
  if (!el?.firstChild || !isFinite(to)) return;
  // Always snap-set so the value is correct even if rAF gets throttled
  // (e.g. background tabs, headless browsers). Only animate when there's
  // meaningful interpolation distance and motion isn't disabled.
  if (!M || PRM || !isFinite(from) || Math.abs(to - from) < 0.05) {
    el.firstChild.nodeValue = fmt(to);
    return;
  }
  el.firstChild.nodeValue = fmt(to);  // snap as a baseline
  const start = performance.now();
  const dur = 600;
  const ease = t => 1 - Math.pow(1 - t, 3);
  function frame(now) {
    const t = Math.min(1, (now - start) / dur);
    const v = from + (to - from) * ease(t);
    el.firstChild.nodeValue = fmt(v);
    if (t < 1) requestAnimationFrame(frame);
    else el.firstChild.nodeValue = fmt(to);  // pin final value
  }
  requestAnimationFrame(frame);
}

// ── Tabs ────────────────────────────────────────────────────
async function loadTabs() {
  const r = await fetch("/api/tabs");
  const { tabs } = await r.json();
  tabsState.tabsManifest = tabs;

  // Derive the canonical category list (real categories only, no meta).
  const allCats = [];
  for (const t of tabs) {
    if (t.meta) continue;
    if (t.subcategories) allCats.push(...t.subcategories);
    else if (t.category) allCats.push(t.category);
  }
  tabsState.allCategories = allCats;

  // Render the left vertical nav.
  const nav = $("#vtabs");
  nav.innerHTML = `<div class="vnav-title">Categories</div>`;
  tabs.forEach((tab) => {
    const btn = document.createElement("button");
    btn.className = "vtab";
    btn.dataset.tab = tab.id;
    const label = stripLeadingGlyph(tab.label);
    btn.innerHTML = `${iconFor(tab.id)}<span class="vtab-text">${label}</span><span class="vtab-stat" id="vtab-stat-${tab.id}"></span>`;
    btn.addEventListener("click", () => switchTab(tab.id));
    nav.appendChild(btn);
  });

  // Render the panels container.
  const panels = $("#panels");
  panels.innerHTML = "";
  tabs.forEach((tab) => {
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.dataset.panel = tab.id;
    panels.appendChild(panel);

    if (tab.meta && tab.id === "overview") {
      panel.appendChild(buildOverviewPanel());
    } else if (tab.subcategories) {
      // One sub-panel per subcategory, only one active at a time.
      const subPanels = document.createElement("div");
      subPanels.className = "panel-subs";
      // Optional mobile-bar (visible when right sidebar collapses on tablet/mobile).
      const mobileBar = document.createElement("div");
      mobileBar.className = "sub-mobile-bar";
      mobileBar.dataset.tabId = tab.id;
      tab.subcategories.forEach((sub, idx) => {
        const mbtn = document.createElement("button");
        mbtn.textContent = SUB_LABELS[sub] || sub;
        mbtn.dataset.sub = sub;
        if (idx === 0) mbtn.classList.add("active");
        mbtn.addEventListener("click", () => switchSubItem(tab.id, sub));
        mobileBar.appendChild(mbtn);
      });
      panel.appendChild(mobileBar);

      tab.subcategories.forEach((sub, idx) => {
        const sp = document.createElement("div");
        sp.className = "sub-panel" + (idx === 0 ? " active" : "");
        sp.dataset.subPanel = sub;
        subPanels.appendChild(sp);
        renderCategoryInto(sub, sp, { providerLabel: SUB_LABELS[sub] || sub });
        if (idx === 0) tabsState.currentSub[tab.id] = sub;
      });
      panel.appendChild(subPanels);
    } else if (tab.category) {
      renderCategoryInto(tab.category, panel);
    }
  });

  // Default to the Overview tab.
  switchTab("overview");
}

function switchTab(tabId) {
  const tab = tabsState.tabsManifest.find(t => t.id === tabId);
  if (!tab) return;
  tabsState.current = tabId;

  $$("#vtabs .vtab").forEach(b => b.classList.toggle("active", b.dataset.tab === tabId));
  $$(".panel").forEach(p => p.classList.toggle("active", p.dataset.panel === tabId));

  // Right sidebar: populate when the active tab has subcategories.
  const right = $("#sidebar-right");
  const grid  = $("#app-grid");
  if (tab.subcategories && tab.subcategories.length) {
    populateSubNav(tab);
    right.hidden = false;
    grid.classList.add("has-sub");
    grid.classList.remove("no-right");
  } else {
    right.hidden = true;
    grid.classList.remove("has-sub");
    grid.classList.add("no-right");
  }

  const entering = $(`.panel[data-panel="${tabId}"]`);
  if (entering) {
    safeAnimate(entering, { opacity: [0, 1], x: [6, 0] }, { duration: 0.22, easing: [0.22, 1, 0.36, 1] });
  }

  // Overview special: auto-scan everything on first activation.
  if (tabId === "overview" && !tabsState.overviewAutoScanned) {
    tabsState.overviewAutoScanned = true;
    scanEverything({ silent: true });
  }
}

function populateSubNav(tab) {
  const title = $("#vsubs-title");
  const list = $("#vsubs-list");
  title.textContent = stripLeadingGlyph(tab.label);
  list.innerHTML = "";
  const activeSub = tabsState.currentSub[tab.id] || tab.subcategories[0];
  tab.subcategories.forEach((sub) => {
    const btn = document.createElement("button");
    btn.className = "vtab" + (sub === activeSub ? " active" : "");
    btn.dataset.sub = sub;
    const cleanable = (tabsState.scans[sub]?.total_cleanable_gb || 0);
    btn.innerHTML = `<span class="vtab-text">${SUB_LABELS[sub] || sub}</span><span class="vtab-stat">${cleanable >= 0.01 ? fmt(cleanable) + ' GB' : ''}</span>`;
    btn.addEventListener("click", () => switchSubItem(tab.id, sub));
    list.appendChild(btn);
  });
}

function switchSubItem(tabId, subId) {
  tabsState.currentSub[tabId] = subId;
  const panel = $(`.panel[data-panel="${tabId}"]`);
  if (!panel) return;
  panel.querySelectorAll(".sub-panel").forEach(p => p.classList.toggle("active", p.dataset.subPanel === subId));
  panel.querySelectorAll(".sub-mobile-bar button").forEach(b => b.classList.toggle("active", b.dataset.sub === subId));
  $$("#vsubs-list .vtab").forEach(b => b.classList.toggle("active", b.dataset.sub === subId));
  const entering = panel.querySelector(`.sub-panel[data-sub-panel="${subId}"]`);
  if (entering) {
    safeAnimate(entering, { opacity: [0, 1], x: [6, 0] }, { duration: 0.22, easing: [0.22, 1, 0.36, 1] });
  }
}

// Per-category color palette for the disk-usage pie chart. Each top-level tab
// gets a distinct hue so a glance at the slices identifies the heavy categories.
const PIE_COLORS = {
  "xcode":    "#0F766E", // teal — accent
  "llms":     "#7C3AED", // violet
  "docker":   "#0EA5E9", // sky
  "apps":     "#F59E0B", // amber
  "creative": "#EC4899", // pink
  "system":   "#64748B", // slate
};

function renderPie() {
  const svg = $("#overview-pie");
  const legend = $("#pie-legend");
  const centerNum = $("#pie-center-num");
  if (!svg || !legend) return;

  // Collect per-tab totals (safe + opt-in + caution = what we've seen on disk).
  // Note: vanilla tabsState.scans[id] holds the raw scan object directly
  // (the React WIP wraps it in { scan, actions }; this one does not).
  const slices = [];
  let grandTotal = 0;
  for (const tab of tabsState.tabsManifest) {
    if (tab.meta) continue;
    let total = 0;
    if (tab.subcategories) {
      for (const sub of tab.subcategories) {
        const s = tabsState.scans[sub];
        if (s) total += (s.totals.safe || 0) + (s.totals.probably_safe || 0) + (s.totals.caution || 0);
      }
    } else if (tab.category) {
      const s = tabsState.scans[tab.category];
      if (s) total = (s.totals.safe || 0) + (s.totals.probably_safe || 0) + (s.totals.caution || 0);
    }
    slices.push({ id: tab.id, label: stripLeadingGlyph(tab.label), total, color: PIE_COLORS[tab.id] || "#888" });
    grandTotal += total;
  }

  if (centerNum) centerNum.textContent = grandTotal > 0 ? fmt(grandTotal) : "—";

  // Build SVG arcs.
  svg.innerHTML = "";
  if (grandTotal < 0.01) {
    // Empty state — show a thin grey ring so the pane never looks broken.
    svg.innerHTML = `<circle cx="50" cy="50" r="42" fill="none" stroke="hsl(0 0% 50% / 0.18)" stroke-width="2" />`;
    legend.innerHTML = slices
      .map((s) => `<span class="legend-item" data-tab="${s.id}"><span class="legend-dot" style="background:${s.color}"></span><span class="legend-name">${s.label}</span><span class="legend-gb">—</span></span>`)
      .join("");
    wireLegendClicks();
    return;
  }

  let startAngle = 0;
  const cx = 50, cy = 50, r = 42;
  for (const slice of slices) {
    if (slice.total <= 0) continue;
    const frac = slice.total / grandTotal;
    const endAngle = startAngle + frac * Math.PI * 2;
    const path = arcPath(cx, cy, r, startAngle, endAngle);
    const el = document.createElementNS("http://www.w3.org/2000/svg", "path");
    el.setAttribute("d", path);
    el.setAttribute("fill", slice.color);
    el.setAttribute("data-tab", slice.id);
    el.style.cursor = "pointer";
    el.addEventListener("click", () => switchTab(slice.id));
    svg.appendChild(el);
    startAngle = endAngle;
  }
  // Donut hole — same bg color so the legend center shows through.
  const hole = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  hole.setAttribute("cx", "50");
  hole.setAttribute("cy", "50");
  hole.setAttribute("r", "22");
  hole.setAttribute("fill", "hsl(0 0% 100%)");
  hole.style.fill = "var(--bg-2, white)";
  svg.appendChild(hole);

  // Legend.
  legend.innerHTML = slices
    .map((s) => `<span class="legend-item" data-tab="${s.id}"><span class="legend-dot" style="background:${s.color}"></span><span class="legend-name">${s.label}</span><span class="legend-gb">${s.total >= 0.01 ? fmt(s.total) + " GB" : "—"}</span></span>`)
    .join("");
  wireLegendClicks();
}

function wireLegendClicks() {
  $$("#pie-legend .legend-item").forEach((el) => {
    el.addEventListener("click", () => {
      const id = el.dataset.tab;
      if (id) switchTab(id);
    });
  });
}

// SVG arc helper. Angles in radians, 0 = top, positive = clockwise (because the
// SVG is rotated -90deg via transform). For our purposes the rotation+angle math
// works out so the slices read clockwise starting from 12 o'clock.
function arcPath(cx, cy, r, startAngle, endAngle) {
  const sx = cx + r * Math.cos(startAngle);
  const sy = cy + r * Math.sin(startAngle);
  const ex = cx + r * Math.cos(endAngle);
  const ey = cy + r * Math.sin(endAngle);
  const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;
  return `M ${cx} ${cy} L ${sx} ${sy} A ${r} ${r} 0 ${largeArc} 1 ${ex} ${ey} Z`;
}

function renderOverviewGrid() {
  const grid = $("#overview-grid");
  if (!grid) return;
  grid.innerHTML = "";
  // Pie refresh follows the same lifecycle as the cards — both consume scans.
  renderPie();

  // Build one card per top-level tab (skip the meta Overview itself).
  for (const tab of tabsState.tabsManifest) {
    if (tab.meta) continue;

    let cleanable = 0, safe = 0, optin = 0, caution = 0;
    let tagline = "";
    let scanned = false;

    if (tab.subcategories) {
      for (const sub of tab.subcategories) {
        const s = tabsState.scans[sub];
        if (s) {
          scanned = true;
          cleanable += s.total_cleanable_gb || 0;
          safe      += s.totals.safe || 0;
          optin     += s.totals.probably_safe || 0;
          caution   += s.totals.caution || 0;
        }
      }
      tagline = `${tab.subcategories.length} sub-tools`;
    } else if (tab.category) {
      const s = tabsState.scans[tab.category];
      if (s) {
        scanned = true;
        cleanable = s.total_cleanable_gb || 0;
        safe = s.totals.safe || 0;
        optin = s.totals.probably_safe || 0;
        caution = s.totals.caution || 0;
        tagline = stripLeadingGlyph(s.tagline || "");
      }
    }

    // Two prominent tier numbers so the math is transparent:
    //   sum of all cards' "safe" lines  == "Clean ALL safe" button GB
    //   sum of all cards' "opt-in" lines == "Clean ALL opt-in" button GB
    // Caution is a smaller informational note since the dashboard never
    // auto-cleans caution-tier paths.
    let statsHtml = "";
    if (!scanned) {
      statsHtml = `<div class="tier-stat zero">scanning…</div>`;
    } else if (safe < 0.001 && optin < 0.001 && caution < 0.001) {
      statsHtml = `<div class="tier-stat zero">nothing to clean</div>`;
    } else {
      statsHtml =
        `<div class="tier-stat safe"><span class="num">${fmt(safe)}</span><span class="unit">GB safe</span></div>` +
        `<div class="tier-stat warn"><span class="num">${fmt(optin)}</span><span class="unit">GB opt-in</span></div>` +
        (caution >= 0.01
          ? `<div class="tier-stat caution-small"><span class="num">${fmt(caution)}</span>&nbsp;GB caution (surface only)</div>`
          : "");
    }

    const card = document.createElement("button");
    card.className = "overview-card";
    card.dataset.openTab = tab.id;
    card.innerHTML = `
      <div class="head">${iconFor(tab.id)}<span class="name">${stripLeadingGlyph(tab.label)}</span></div>
      <div class="tagline">${tagline || "—"}</div>
      ${statsHtml}
      <div class="open-hint">Open <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></div>
    `;
    card.addEventListener("click", () => switchTab(tab.id));
    grid.appendChild(card);
  }
}

function updateVtabStats() {
  // Per-tab cleanable-GB shown next to the left-nav label.
  for (const tab of tabsState.tabsManifest) {
    if (tab.meta) continue;
    const el = $(`#vtab-stat-${tab.id}`);
    if (!el) continue;
    let cleanable = 0;
    if (tab.subcategories) {
      for (const sub of tab.subcategories) {
        const s = tabsState.scans[sub]; if (s) cleanable += s.total_cleanable_gb || 0;
      }
    } else if (tab.category) {
      const s = tabsState.scans[tab.category]; if (s) cleanable = s.total_cleanable_gb || 0;
    }
    el.textContent = cleanable >= 0.01 ? `${fmt(cleanable)} GB` : "";
  }
  // Also refresh the right-sub-nav stats if it's open.
  const cur = tabsState.tabsManifest.find(t => t.id === tabsState.current);
  if (cur?.subcategories) populateSubNav(cur);
}

// ── Scan a single category ─────────────────────────────────
async function scanAndRender(catId) {
  const scanBtn = document.querySelector(`button[data-scan="${catId}"]`);
  if (scanBtn) { scanBtn.textContent = "Scanning…"; scanBtn.disabled = true; }

  const [scan, actions] = await Promise.all([
    fetch(`/api/category/${catId}/scan`).then(r => r.json()),
    fetch(`/api/category/${catId}/actions`).then(r => r.json()),
  ]);
  tabsState.scans[catId] = scan;

  const hdr = $(`#hdr-${catId}`);
  if (hdr) hdr.textContent = stripLeadingGlyph(scan.label) || scan.label;
  const tag = $(`#tagline-${catId}`);
  if (tag) tag.textContent = scan.tagline || "";
  $(`#totals-${catId}`).innerHTML = `
    <span class="pill safe">safe <strong>${fmt(scan.totals.safe || 0)} GB</strong></span>
    <span class="pill warn">opt-in <strong>${fmt(scan.totals.probably_safe || 0)} GB</strong></span>
    <span class="pill danger">caution <strong>${fmt(scan.totals.caution || 0)} GB</strong></span>
    <span class="pill accent">cleanable <strong>${fmt(scan.total_cleanable_gb)} GB</strong></span>
  `;

  let scanHtml = "";
  for (const groupName of ["safe", "probably_safe", "caution"]) {
    const group = scan.groups[groupName];
    if (!group || !group.paths.length) continue;
    const meta = CATEGORY_LABELS[groupName];
    const noteCls = groupName === "caution" ? "group-note caution" : "group-note";
    scanHtml += `<h3 class="${groupName}">${meta.label}</h3>
      <div class="${noteCls}">${meta.note}</div>`;
    for (const p of group.paths.slice().sort((a,b) => b.size_gb - a.size_gb)) {
      const sizeLabel = p.size_gb >= 0.01 ? `${fmt(p.size_gb)} GB`
                       : p.size_kb >= 1024 ? `${Math.round(p.size_kb/1024)} MB`
                       : p.size_kb > 0     ? `${p.size_kb} KB`
                       :                     "—";
      const cleanable = (groupName === "safe" || groupName === "probably_safe") && p.exists && p.size_kb > 0;
      const cleanBtn = cleanable
        ? `<button class="path-clean" data-cat="${catId}" data-path="${encodeURIComponent(p.path)}" data-label="${p.label.replace(/"/g, '&quot;')}" title="Delete contents of this path">Clean</button>`
        : `<span class="path-clean-placeholder"></span>`;
      scanHtml += `<div class="path-row${!p.exists ? ' missing' : ''}" data-row="${groupName}">
        <div class="name"><strong>${p.label}</strong><code>${p.path}</code></div>
        <div class="value">${sizeLabel}</div>
        ${cleanBtn}
      </div>`;
    }
  }
  $(`#scan-${catId}`).innerHTML = scanHtml;
  applyCategoryCallouts(catId, scan);
  const rows = $(`#scan-${catId}`).querySelectorAll(".path-row");
  if (rows.length && M && !PRM) {
    safeAnimate(rows, { opacity: [0, 1], y: [4, 0] }, { duration: 0.28, delay: safeStagger(0.025), easing: [0.22, 1, 0.36, 1] });
  }
  $(`#scan-${catId}`).querySelectorAll(`button.path-clean`).forEach(btn => {
    btn.addEventListener("click", () => {
      const path = decodeURIComponent(btn.dataset.path);
      cleanSinglePath(btn.dataset.cat, path, btn.dataset.label);
    });
  });
  const safeBtn  = document.querySelector(`button[data-clean-all="${catId}"][data-tier="safe"]`);
  const optInBtn = document.querySelector(`button[data-clean-all="${catId}"][data-tier="probably_safe"]`);
  if (safeBtn) {
    safeBtn.textContent = `Clean all safe · ${fmt(scan.totals.safe || 0)} GB`;
    safeBtn.disabled = (scan.totals.safe || 0) < 0.001;
  }
  if (optInBtn) {
    optInBtn.textContent = `Clean opt-in · ${fmt(scan.totals.probably_safe || 0)} GB`;
    optInBtn.disabled = (scan.totals.probably_safe || 0) < 0.001;
  }
  if (scanBtn) { scanBtn.textContent = "Re-scan"; scanBtn.disabled = false; }

  // Actions list — cost banner is LIFTED to the top of the card
  let actionsHtml = "";
  for (const a of actions.actions) {
    const costSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>`;
    const costBlock = a.cost
      ? `<div class="cost"><span>${costSvg}</span><div class="cost-text"><span class="cost-label">Cost of doing this</span>${a.cost}</div></div>`
      : "";
    const sudoBlock = a.sudo
      ? `<div class="cost sudo"><span>${costSvg}</span><div class="cost-text"><span class="cost-label">Sudo required</span>This surfaces info only. Run the printed commands in your Terminal to actually delete.</div></div>`
      : "";
    actionsHtml += `<div class="action-card${a.informational ? ' informational' : ''}">
      ${costBlock}
      ${sudoBlock}
      <div class="body">
        <div class="label">${a.label}</div>
        <div class="desc">${a.desc}</div>
        <button data-action="${a.id}" data-category="${catId}" data-cost="${(a.cost || '').replace(/"/g, '&quot;')}">${a.informational ? "Show details" : "Run"}</button>
      </div>
    </div>`;
  }
  $(`#action-list-${catId}`).innerHTML = actionsHtml;
  $(`#actions-${catId}`).hidden = false;
  $(`#actions-${catId}`).querySelectorAll("button[data-action]").forEach(btn => {
    btn.addEventListener("click", () => runAction(btn.dataset.category, btn.dataset.action, btn.parentElement.querySelector(".label").textContent, btn.dataset.cost));
  });

  // After every scan, refresh the Overview grid + left-nav stats.
  renderOverviewGrid();
  updateVtabStats();
}

function applyCategoryCallouts(catId, scan) {
  const el = $(`#callout-${catId}`);
  if (!el) return;
  el.hidden = true;
  el.innerHTML = "";

  if (catId === "docker") {
    const cautionPaths = (scan.groups?.caution?.paths || [])
      .filter(p => p.path.includes("Docker.raw") && p.exists && p.size_kb > 0)
      .sort((a, b) => b.size_kb - a.size_kb);
    if (cautionPaths.length) {
      const top = cautionPaths[0];
      const sizeLabel = top.size_gb >= 0.01 ? `${fmt(top.size_gb)} GB`
                       : top.size_kb >= 1024 ? `${Math.round(top.size_kb / 1024)} MB`
                       : `${top.size_kb} KB`;
      el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>` +
        `<div><strong>Docker.raw is ${sizeLabel}.</strong> Pruning shrinks what's INSIDE the VM, not the .raw file on disk. See <em>How to actually shrink Docker.raw</em> below for the reset path. <code>${top.path}</code></div>`;
      el.hidden = false;
    }
  }
}

// ── Clean a single path / all-tier / aggregate ─────────────
async function cleanAllInCategory(catId, tier) {
  const tierLabel = tier === "safe" ? "all safe" : "all opt-in";
  const scan = tabsState.scans[catId];
  const gb = scan ? (scan.totals[tier] || 0) : 0;
  const tierName = tier === "safe" ? "safe-tier" : "opt-in-tier";
  const okPress = await openConfirm({
    title: "Confirm cleanup",
    what: `Clean ${tierLabel} paths in ${scan ? scan.label : catId}?`,
    detail: `Frees ~${fmt(gb)} GB. Runs the same rm -rf each per-path button runs.`,
    costText: tier === "safe"
      ? "First build after this regenerates the affected caches (typically ~30s extra)."
      : "Opt-in caches you've selectively trusted — re-fetched on next use. Reviewable below before you confirm.",
    danger: true,
    okLabel: `Clean ${tierName}`,
  });
  if (!okPress) return;
  disableAllButtons(true);
  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ Clean ${tierLabel} in ${catId}`, "dim");
  const es = new EventSource(`/api/clean-all-safe?category=${encodeURIComponent(catId)}&tier=${encodeURIComponent(tier)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      const cls = line.startsWith("▶") ? "ok" : line.startsWith("  cleaning:") ? "dim" : "";
      appendLine(line, cls);
    } else if (msg.event === "done") {
      es.close();
      appendLine(`✓ Done. Freed ${fmt(msg.data.freed_gb)} GB.`, "ok");
      successPulse(msg.data.freed_gb);
      disableAllButtons(false);
      loadStatus(); loadHistory();
      scanAndRender(catId);
    }
  };
  es.onerror = () => { es.close(); appendLine("✗ Connection lost.", "err"); disableAllButtons(false); };
}

async function cleanSinglePath(catId, path, label) {
  const okPress = await openConfirm({
    title: "Confirm cleanup",
    what: `Clean "${label}"?`,
    detail: path,
    costText: "Deletes the contents of this path (rm -rf <path>/*). Cannot be undone — but only safe-tier and opt-in paths are surfaced for one-click cleaning, so the worst case is a re-cache.",
    danger: true,
    okLabel: "Clean this path",
  });
  if (!okPress) return;
  disableAllButtons(true);
  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ Clean: ${label} (${path})`, "dim");
  const es = new EventSource(`/api/clean-path?category=${encodeURIComponent(catId)}&path=${encodeURIComponent(path)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      appendLine(line, line.startsWith("▶") ? "ok" : "");
    } else if (msg.event === "done") {
      es.close();
      appendLine(`✓ Done. Freed ${fmt(msg.data.freed_gb)} GB.`, "ok");
      successPulse(msg.data.freed_gb);
      disableAllButtons(false);
      loadStatus(); loadHistory();
      scanAndRender(catId);

function disableAllButtons(disabled) {
  $$("button[data-action], button[data-scan], button[data-clean-all], button.path-clean, #btn-scan-all, #btn-clean-all-safe, #btn-clean-all-optin").forEach(b => b.disabled = disabled);
}

async function runAction(catId, actionId, label, costText) {
  const okPress = await openConfirm({
    title: "Confirm action",
    what: `Run "${label}"?`,
    costText: costText || "Read the cost note above before confirming.",
    danger: false,
    okLabel: "Run",
  });
  if (!okPress) return;
  $$("button[data-action]").forEach(b => b.disabled = true);
  $$("button[data-scan]").forEach(b => b.disabled = true);

  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ ${label}`, "dim");

  const es = new EventSource(`/api/run?category=${encodeURIComponent(catId)}&action=${encodeURIComponent(actionId)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      let cls = "";
      if (line.startsWith("▶") || line.startsWith("✓")) cls = "ok";
      else if (line.startsWith("  cost:")) cls = "warn";
      else if (line.toLowerCase().includes("error")) cls = "err";
      appendLine(line, cls);
    } else if (msg.event === "done") {
      es.close();
      const freed = msg.data.freed_gb;
      appendLine(`✓ Done. Freed ${fmt(freed)} GB.`, "ok");
      if (freed > 0) successPulse(freed);
      $$("button[data-action]").forEach(b => b.disabled = false);
      $$("button[data-scan]").forEach(b => b.disabled = false);
      loadStatus(); loadHistory();
      scanAndRender(catId);
    }
  };
  es.onerror = () => {
    es.close();
    appendLine("✗ Connection lost.", "err");
    $$("button[data-action]").forEach(b => b.disabled = false);
    $$("button[data-scan]").forEach(b => b.disabled = false);
  };
}

function appendLine(text, cls = "") {
  // Two render targets:
  //   - bottom #output (always present, visible on non-overview tabs)
  //   - top #output-host-top (Overview's terminal pane, present only when overview is mounted)
  // Both stay in sync so cleans triggered from any tab show in whichever pane the user is viewing.
  const targets = [];
  const bottom = $("#output");
  if (bottom) targets.push(bottom);
  const topHost = $("#output-host-top");
  if (topHost) targets.push(topHost);

  // Hide the idle placeholder once we start emitting real output.
  const idle = $("#terminal-idle");
  if (idle) idle.style.display = "none";

  for (const out of targets) {
    if (out.id === "output" && !out.classList.contains("visible")) out.classList.add("visible");
    const span = document.createElement("span");
    span.className = "out-line" + (cls ? " " + cls : "");
    span.textContent = text;
    out.appendChild(span);
    safeAnimate(span, { opacity: [0, 1], y: [-3, 0] }, { duration: 0.18, easing: [0.22, 1, 0.36, 1] });
    out.scrollTop = out.scrollHeight;
  }
}

function clearOutput() {
  const bottom = $("#output");
  const topHost = $("#output-host-top");
  if (bottom) bottom.innerHTML = "";
  if (topHost) {
    topHost.innerHTML = '<span class="terminal-idle" id="terminal-idle">Idle — nothing is running. Hit Scan or Clean to see live output.</span>';
  }
}

function successPulse(freedGb) {
  if (!M || PRM || !freedGb || freedGb <= 0) return;
  const free = $("#free-gb");
  if (free) safeAnimate(free, { scale: [1, 1.05, 1] }, { duration: 0.5, easing: [0.22, 1, 0.36, 1] });
}

// ── Aggregate scan + clean ─────────────────────────────────
async function scanEverything(opts = {}) {
  const btn = $("#btn-scan-all");
  if (btn && !opts.silent) { btn.disabled = true; }
  $("#btn-clean-all-safe") && ($("#btn-clean-all-safe").disabled = true);
  $("#btn-clean-all-optin") && ($("#btn-clean-all-optin").disabled = true);
  const hint = $("#ga-hint");
  if (hint) hint.innerHTML = "Scanning every category in parallel…";

  const allCats = tabsState.allCategories.length ? tabsState.allCategories : ["xcode", "llms-claude", "llms-cursor", "llms-chatgpt", "docker", "apps", "creative-adobe", "creative-davinci", "creative-finalcut", "creative-logic", "creative-blender", "creative-obs", "system"];
  let completed = 0;
  const progress = () => `Scanning ${allCats.length} categories… <strong>${completed}/${allCats.length}</strong>`;
  if (hint) hint.innerHTML = progress();
  await Promise.all(allCats.map(c =>
    scanAndRender(c)
      .catch(() => null)
      .finally(() => {
        completed++;
        if (hint) hint.innerHTML = progress();
        renderOverviewGrid();
        updateVtabStats();
      })
  ));

  let totalSafe = 0, totalOptIn = 0;
  for (const c of allCats) {
    const s = tabsState.scans[c]; if (!s) continue;
    totalSafe  += s.totals.safe || 0;
    totalOptIn += s.totals.probably_safe || 0;
  }
  const safeBtn = $("#btn-clean-all-safe"), optBtn = $("#btn-clean-all-optin");
  if (safeBtn) {
    safeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Clean ALL safe · ${fmt(totalSafe)} GB`;
    safeBtn.disabled = totalSafe < 0.001;
  }
  if (optBtn) {
    optBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4"/><path d="M12 17h.01"/></svg>Clean ALL opt-in · ${fmt(totalOptIn)} GB`;
    optBtn.disabled = totalOptIn < 0.001;
  }
  if (hint) {
    if (totalSafe + totalOptIn < 0.01) {
      hint.innerHTML = `<strong>You're clean.</strong> Nothing to reclaim across all ${allCats.length} categories.`;
    } else {
      hint.innerHTML = `<strong>${fmt(totalSafe + totalOptIn)} GB cleanable</strong> across ${allCats.length} categories. Click a card below to drill in, or use the buttons above.`;
    }
  }
  if (btn) { btn.disabled = false; btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v6h-6"/></svg>Re-scan everything`; }
}

async function cleanEverything(tier) {
  const label = tier === "safe" ? "ALL safe" : "ALL opt-in";
  let total = 0;
  for (const c of tabsState.allCategories) {
    const s = tabsState.scans[c]; if (!s) continue;
    total += s.totals[tier] || 0;
  }
  const okPress = await openConfirm({
    title: "Confirm cleanup",
    what: `Clean ${label} across every category?`,
    detail: `Frees ~${fmt(total)} GB total. Same rm -rf the per-tab buttons run, just batched.`,
    costText: tier === "safe"
      ? "First build after this regenerates Xcode caches (~30s extra). Browser caches re-fetch. LLM tool indexes rebuild on next open. Caution-tier items are NOT touched."
      : "Opt-in caches you've explicitly trusted are removed. Plus everything safe. Caution-tier items are still NOT touched.",
    danger: true,
    okLabel: `Clean ${tier === "safe" ? "safe-tier" : "opt-in-tier"} everywhere`,
  });
  if (!okPress) return;

  disableAllButtons(true);
  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ Clean ${label} across every category`, "dim");

  const es = new EventSource(`/api/clean-everything?tier=${encodeURIComponent(tier)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      let cls = "";
      if (line.startsWith("▶") || line.startsWith("✓")) cls = "ok";
      else if (line.startsWith("[")) cls = "warn";
      else if (line.startsWith("  cleaning:")) cls = "dim";
      appendLine(line, cls);
    } else if (msg.event === "done") {
      es.close();
      appendLine(`✓ Done. Freed ${fmt(msg.data.freed_gb)} GB across all categories.`, "ok");
      successPulse(msg.data.freed_gb);
      disableAllButtons(false);
      loadStatus(); loadHistory();
      scanEverything({ silent: true });
    }
  };
  es.onerror = () => { es.close(); appendLine("✗ Connection lost.", "err"); disableAllButtons(false); };
}

// ── Confirm modal (replaces window.confirm) ────────────────
function openConfirm(opts) {
  const modal = $("#confirm-modal");
  $("#confirm-title").textContent = opts.title || "Confirm";
  $("#confirm-what").textContent  = opts.what || "Continue?";
  const detail = $("#confirm-detail");
  if (opts.detail) { detail.textContent = opts.detail; detail.hidden = false; }
  else { detail.hidden = true; }
  const cost = $("#confirm-cost-block");
  if (opts.costText) { $("#confirm-cost-text").textContent = opts.costText; cost.hidden = false; }
  else { cost.hidden = true; }
  const okBtn = $("#confirm-ok");
  okBtn.textContent = opts.okLabel || "Confirm";
  okBtn.classList.toggle("danger", !!opts.danger);

  modal.hidden = false;
  safeAnimate(modal.querySelector(".modal-card"), { opacity: [0, 1], scale: [0.96, 1] }, { duration: 0.22, easing: [0.34, 1.56, 0.64, 1] });

  return new Promise((resolve) => {
    const cleanup = (result) => {
      modal.hidden = true;
      okBtn.onclick = null;
      $("#confirm-cancel").onclick = null;
      $("#confirm-close").onclick = null;
      modal.removeEventListener("click", onBackdrop);
      document.removeEventListener("keydown", onKey);
      resolve(result);
    };
    const onBackdrop = (ev) => { if (ev.target === modal) cleanup(false); };
    const onKey = (ev) => { if (ev.key === "Escape") cleanup(false); else if (ev.key === "Enter") cleanup(true); };
    okBtn.onclick = () => cleanup(true);
    $("#confirm-cancel").onclick = () => cleanup(false);
    $("#confirm-close").onclick  = () => cleanup(false);
    modal.addEventListener("click", onBackdrop);
    document.addEventListener("keydown", onKey);
    setTimeout(() => okBtn.focus(), 30);
  });
}

// ── Changelog modal ─────────────────────────────────────────
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function renderInline(s) {
  return escapeHtml(s)
    .replace(/`([^`]+)`/g,  "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g,    "<em>$1</em>");
}
function renderMarkdown(md) {
  const lines = md.split("\n");
  let html = "", inUl = false;
  const closeUl = () => { if (inUl) { html += "</ul>"; inUl = false; } };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (line.startsWith("# ")) { closeUl(); continue; }
    if (line.startsWith("## ")) { closeUl(); html += `<h2>${escapeHtml(line.slice(3))}</h2>`; }
    else if (line.startsWith("### ")) { closeUl(); html += `<h3>${escapeHtml(line.slice(4))}</h3>`; }
    else if (line.startsWith("- ")) { if (!inUl) { html += "<ul>"; inUl = true; } html += `<li>${renderInline(line.slice(2))}</li>`; }
    else if (line === "") { closeUl(); }
    else { closeUl(); html += `<p>${renderInline(line)}</p>`; }
  }
  if (inUl) html += "</ul>";
  return html;
}
async function openChangelog() {
  $("#changelog-modal").hidden = false;
  $("#changelog-body").textContent = "Loading…";
  safeAnimate($("#changelog-modal").querySelector(".modal-card"), { opacity: [0, 1], scale: [0.97, 1] }, { duration: 0.22, easing: [0.34, 1.56, 0.64, 1] });
  try {
    const r = await fetch("/api/changelog");
    const md = await r.text();
    $("#changelog-body").innerHTML = renderMarkdown(md);
    $("#changelog-body").scrollTop = 0;
  } catch (e) {
    $("#changelog-body").textContent = "Failed to load changelog.";
  }
}
function closeChangelog() { $("#changelog-modal").hidden = true; }

// ── Wire-up ─────────────────────────────────────────────────
$("#version").addEventListener("click", openChangelog);
$("#changelog-close").addEventListener("click", closeChangelog);
$("#changelog-modal").addEventListener("click", (ev) => { if (ev.target.id === "changelog-modal") closeChangelog(); });
document.addEventListener("keydown", (ev) => { if (ev.key === "Escape" && !$("#changelog-modal").hidden) closeChangelog(); });
$("#footer-changelog")?.addEventListener("click", (ev) => { ev.preventDefault(); openChangelog(); });

loadStatus();
loadHistory();
loadTabs();
setInterval(loadStatus, 15000);
</script>
