// ── Row-table state (v0.17.0) ──────────────────────────────
// Per-category filter + sort preference so toggling Min size / Sort persists
// across rescans. Tabsstate stores `tableState[catId] = { minMB, sortBy, sortDir }`.
function getRowState(catId) {
  if (!tabsState.tableState) tabsState.tableState = {};
  if (!tabsState.tableState[catId]) {
    tabsState.tableState[catId] = { minMB: 0, sortBy: "size", sortDir: "desc" };
  }
  return tabsState.tableState[catId];
}

function renderPathRows(catId) {
  const scan = tabsState.scans[catId];
  const host = $(`#scan-${catId}`);
  if (!scan || !host) return;
  const state = getRowState(catId);

  let html = "";
  let hadAnyRow = false;
  for (const groupName of ["safe", "probably_safe", "caution"]) {
    const group = scan.groups[groupName];
    if (!group || !group.paths.length) continue;
    const meta = CATEGORY_LABELS[groupName];
    const noteCls = groupName === "caution" ? "group-note caution" : "group-note";

    // Sort + filter per row-state.
    const rows = group.paths.slice();
    rows.sort((a, b) => {
      let cmp;
      if (state.sortBy === "name") cmp = (a.label || "").localeCompare(b.label || "");
      else cmp = (a.size_gb || 0) - (b.size_gb || 0); // size
      return state.sortDir === "asc" ? cmp : -cmp;
    });

    // Build the rows, marking those under the min-size threshold so CSS can hide them.
    let visibleInGroup = 0;
    let rowHtml = "";
    const minKB = state.minMB * 1024;
    for (const p of rows) {
      const sizeLabel = p.size_gb >= 0.01 ? `${fmt(p.size_gb)} GB`
                       : p.size_kb >= 1024 ? `${Math.round(p.size_kb/1024)} MB`
                       : p.size_kb > 0     ? `${p.size_kb} KB`
                       :                     "—";
      const cleanable = (groupName === "safe" || groupName === "probably_safe") && p.exists && p.size_kb > 0;
      const cleanBtn = cleanable
        ? `<button class="path-clean" data-cat="${catId}" data-path="${encodeURIComponent(p.path)}" data-label="${p.label.replace(/"/g, '&quot;')}" title="Delete contents of this path">Clean</button>`
        : `<span class="path-clean-placeholder"></span>`;
      const belowMin = minKB > 0 && p.size_kb < minKB;
      const filterCls = belowMin ? ' size-filtered' : '';
      if (!belowMin) visibleInGroup++;
      rowHtml += `<div class="path-row${!p.exists ? ' missing' : ''}${filterCls}" data-row="${groupName}">
        <div class="name"><strong>${p.label}</strong><code>${p.path}</code></div>
        <div class="value">${sizeLabel}</div>
        ${cleanBtn}
      </div>`;
    }
    if (visibleInGroup > 0 || state.minMB === 0) {
      html += `<h3 class="${groupName}">${meta.label}</h3><div class="${noteCls}">${meta.note}</div>${rowHtml}`;
      hadAnyRow = true;
    }
  }
  if (!hadAnyRow && state.minMB > 0) {
    html = `<div class="empty-state" style="padding:18px;color:var(--text-faint);font-size:12px;text-align:center;">No paths match the ≥${state.minMB >= 1024 ? (state.minMB/1024)+" GB" : state.minMB+" MB"} filter. Lower the threshold to see more.</div>`;
  }

  host.innerHTML = html;

  const rows = host.querySelectorAll(".path-row");
  if (rows.length && M && !PRM) {
    safeAnimate(rows, { opacity: [0, 1], y: [4, 0] }, { duration: 0.28, delay: safeStagger(0.025), easing: [0.22, 1, 0.36, 1] });
  }
  host.querySelectorAll(`button.path-clean`).forEach(btn => {
    btn.addEventListener("click", () => {
      const path = decodeURIComponent(btn.dataset.path);
      cleanSinglePath(btn.dataset.cat, path, btn.dataset.label);
    });
  });
}

function wireRowToolbar(catId) {
  const toolbar = $(`#row-toolbar-${catId}`);
  if (!toolbar) return;
  toolbar.hidden = false;
  const state = getRowState(catId);

  // Reflect current state visually.
  const reflect = () => {
    toolbar.querySelectorAll("[data-min]").forEach((b) => {
      b.classList.toggle("active", parseInt(b.dataset.min, 10) === state.minMB);
    });
    toolbar.querySelectorAll("[data-sort]").forEach((b) => {
      b.classList.toggle("active", b.dataset.sort === state.sortBy);
    });
    const dirBtn = toolbar.querySelector("[data-dir]");
    if (dirBtn) dirBtn.textContent = state.sortDir === "asc" ? "↑" : "↓";
  };
  reflect();

  if (toolbar.dataset.wired === "1") return;
  toolbar.dataset.wired = "1";

  toolbar.querySelectorAll("[data-min]").forEach((b) => {
    b.addEventListener("click", () => {
      state.minMB = parseInt(b.dataset.min, 10) || 0;
      reflect();
      renderPathRows(catId);
    });
  });
  toolbar.querySelectorAll("[data-sort]").forEach((b) => {
    b.addEventListener("click", () => {
      state.sortBy = b.dataset.sort;
      reflect();
      renderPathRows(catId);
    });
  });
  const dirBtn = toolbar.querySelector("[data-dir]");
  if (dirBtn) {
    dirBtn.addEventListener("click", () => {
      state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      reflect();
      renderPathRows(catId);
    });
  }
}

// ── Scan a single category ─────────────────────────────────
async function scanAndRender(catId) {
  const scanBtn = document.querySelector(`button[data-scan="${catId}"]`);
  if (scanBtn) { scanBtn.textContent = "Scanning…"; scanBtn.disabled = true; }

  const [scan, actions] = await Promise.all([
    fetch(`/api/category/${catId}/scan`).then(r => r.json()),
    fetch(`/api/category/${catId}/actions`).then(r => r.json()),
  ]);
  tabsState.scans[catId] = scan;

  const hdr = $(`#hdr-${catId}`);
  if (hdr) hdr.textContent = stripLeadingGlyph(scan.label) || scan.label;
  const tag = $(`#tagline-${catId}`);
  if (tag) tag.textContent = scan.tagline || "";
  $(`#totals-${catId}`).innerHTML = `
    <span class="pill safe">safe <strong>${fmt(scan.totals.safe || 0)} GB</strong></span>
    <span class="pill warn">opt-in <strong>${fmt(scan.totals.probably_safe || 0)} GB</strong></span>
    <span class="pill danger">caution <strong>${fmt(scan.totals.caution || 0)} GB</strong></span>
    <span class="pill accent">cleanable <strong>${fmt(scan.total_cleanable_gb)} GB</strong></span>
  `;

  renderPathRows(catId);

  $(`#scan-${catId}`).querySelectorAll(`button.path-clean`).forEach(btn => {
    btn.addEventListener("click", () => {
      const path = decodeURIComponent(btn.dataset.path);
      cleanSinglePath(btn.dataset.cat, path, btn.dataset.label);
    });
  });

  applyCategoryCallouts(catId, scan);
  wireRowToolbar(catId);
  const safeBtn  = document.querySelector(`button[data-clean-all="${catId}"][data-tier="safe"]`);
  const optInBtn = document.querySelector(`button[data-clean-all="${catId}"][data-tier="probably_safe"]`);
  if (safeBtn) {
    safeBtn.textContent = `Clean all safe · ${fmt(scan.totals.safe || 0)} GB`;
    safeBtn.disabled = (scan.totals.safe || 0) < 0.001;
  }
  if (optInBtn) {
    optInBtn.textContent = `Clean opt-in · ${fmt(scan.totals.probably_safe || 0)} GB`;
    optInBtn.disabled = (scan.totals.probably_safe || 0) < 0.001;
  }
  if (scanBtn) { scanBtn.textContent = "Re-scan"; scanBtn.disabled = false; }

  // Actions list — cost banner is LIFTED to the top of the card
  let actionsHtml = "";
  for (const a of actions.actions) {
    const costSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>`;
    const costBlock = a.cost
      ? `<div class="cost"><span>${costSvg}</span><div class="cost-text"><span class="cost-label">Cost of doing this</span>${a.cost}</div></div>`
      : "";
    const sudoBlock = a.sudo
      ? `<div class="cost sudo"><span>${costSvg}</span><div class="cost-text"><span class="cost-label">Sudo required</span>This surfaces info only. Run the printed commands in your Terminal to actually delete.</div></div>`
      : "";
    actionsHtml += `<div class="action-card${a.informational ? ' informational' : ''}">
      ${costBlock}
      ${sudoBlock}
      <div class="body">
        <div class="label">${a.label}</div>
        <div class="desc">${a.desc}</div>
        <button data-action="${a.id}" data-category="${catId}" data-cost="${(a.cost || '').replace(/"/g, '&quot;')}">${a.informational ? "Show details" : "Run"}</button>
      </div>
    </div>`;
  }
  $(`#action-list-${catId}`).innerHTML = actionsHtml;
  $(`#actions-${catId}`).hidden = false;
  $(`#actions-${catId}`).querySelectorAll("button[data-action]").forEach(btn => {
    btn.addEventListener("click", () => runAction(btn.dataset.category, btn.dataset.action, btn.parentElement.querySelector(".label").textContent, btn.dataset.cost));
  });

  // After every scan, refresh the Overview grid + left-nav stats.
  renderOverviewGrid();
  updateVtabStats();
}

function applyCategoryCallouts(catId, scan) {
  const el = $(`#callout-${catId}`);
  if (!el) return;
  el.hidden = true;
  el.innerHTML = "";

  if (catId === "docker") {
    const cautionPaths = (scan.groups?.caution?.paths || [])
      .filter(p => p.path.includes("Docker.raw") && p.exists && p.size_kb > 0)
      .sort((a, b) => b.size_kb - a.size_kb);
    if (cautionPaths.length) {
      const top = cautionPaths[0];
      const sizeLabel = top.size_gb >= 0.01 ? `${fmt(top.size_gb)} GB`
                       : top.size_kb >= 1024 ? `${Math.round(top.size_kb / 1024)} MB`
                       : `${top.size_kb} KB`;
      el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>` +
        `<div><strong>Docker.raw is ${sizeLabel}.</strong> Pruning shrinks what's INSIDE the VM, not the .raw file on disk. See <em>How to actually shrink Docker.raw</em> below for the reset path. <code>${top.path}</code></div>`;
      el.hidden = false;
    }
  }
}

// ── Clean a single path / all-tier / aggregate ─────────────
async function cleanAllInCategory(catId, tier) {
  const tierLabel = tier === "safe" ? "all safe" : "all opt-in";
  const scan = tabsState.scans[catId];
  const gb = scan ? (scan.totals[tier] || 0) : 0;
  const tierName = tier === "safe" ? "safe-tier" : "opt-in-tier";
  const okPress = await openConfirm({
    title: "Confirm cleanup",
    what: `Clean ${tierLabel} paths in ${scan ? scan.label : catId}?`,
    detail: `Frees ~${fmt(gb)} GB. Runs the same rm -rf each per-path button runs.`,
    costText: tier === "safe"
      ? "First build after this regenerates the affected caches (typically ~30s extra)."
      : "Opt-in caches you've selectively trusted — re-fetched on next use. Reviewable below before you confirm.",
    danger: true,
    okLabel: `Clean ${tierName}`,
  });
  if (!okPress) return;
  disableAllButtons(true);
  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ Clean ${tierLabel} in ${catId}`, "dim");
  const es = new EventSource(`/api/clean-all-safe?category=${encodeURIComponent(catId)}&tier=${encodeURIComponent(tier)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      const cls = line.startsWith("▶") ? "ok" : line.startsWith("  cleaning:") ? "dim" : "";
      appendLine(line, cls);
    } else if (msg.event === "done") {
      es.close();
      appendLine(`✓ Done. Freed ${fmt(msg.data.freed_gb)} GB.`, "ok");
      successPulse(msg.data.freed_gb);
      disableAllButtons(false);
      loadStatus(); loadHistory();
      scanAndRender(catId);
    }
  };
  es.onerror = () => { es.close(); appendLine("✗ Connection lost.", "err"); disableAllButtons(false); };
}

async function cleanSinglePath(catId, path, label) {
  const okPress = await openConfirm({
    title: "Confirm cleanup",
    what: `Clean "${label}"?`,
    detail: path,
    costText: "Deletes the contents of this path (rm -rf <path>/*). Cannot be undone — but only safe-tier and opt-in paths are surfaced for one-click cleaning, so the worst case is a re-cache.",
    danger: true,
    okLabel: "Clean this path",
  });
  if (!okPress) return;
  disableAllButtons(true);
  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ Clean: ${label} (${path})`, "dim");
  const es = new EventSource(`/api/clean-path?category=${encodeURIComponent(catId)}&path=${encodeURIComponent(path)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      appendLine(line, line.startsWith("▶") ? "ok" : "");
    } else if (msg.event === "done") {
      es.close();
      appendLine(`✓ Done. Freed ${fmt(msg.data.freed_gb)} GB.`, "ok");
      successPulse(msg.data.freed_gb);
      disableAllButtons(false);
      loadStatus(); loadHistory();
      scanAndRender(catId);
    }
  };
  es.onerror = () => { es.close(); appendLine("✗ Connection lost.", "err"); disableAllButtons(false); };
}

function disableAllButtons(disabled) {
  $$("button[data-action], button[data-scan], button[data-clean-all], button.path-clean, #btn-scan-all, #btn-clean-all-safe, #btn-clean-all-optin").forEach(b => b.disabled = disabled);
}

async function runAction(catId, actionId, label, costText) {
  const okPress = await openConfirm({
    title: "Confirm action",
    what: `Run "${label}"?`,
    costText: costText || "Read the cost note above before confirming.",
    danger: false,
    okLabel: "Run",
  });
  if (!okPress) return;
  $$("button[data-action]").forEach(b => b.disabled = true);
  $$("button[data-scan]").forEach(b => b.disabled = true);

  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ ${label}`, "dim");

  const es = new EventSource(`/api/run?category=${encodeURIComponent(catId)}&action=${encodeURIComponent(actionId)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      let cls = "";
      if (line.startsWith("▶") || line.startsWith("✓")) cls = "ok";
      else if (line.startsWith("  cost:")) cls = "warn";
      else if (line.toLowerCase().includes("error")) cls = "err";
      appendLine(line, cls);
    } else if (msg.event === "done") {
      es.close();
      const freed = msg.data.freed_gb;
      appendLine(`✓ Done. Freed ${fmt(freed)} GB.`, "ok");
      if (freed > 0) successPulse(freed);
      $$("button[data-action]").forEach(b => b.disabled = false);
      $$("button[data-scan]").forEach(b => b.disabled = false);
      loadStatus(); loadHistory();
      scanAndRender(catId);
    }
  };
  es.onerror = () => {
    es.close();
    appendLine("✗ Connection lost.", "err");
    $$("button[data-action]").forEach(b => b.disabled = false);
    $$("button[data-scan]").forEach(b => b.disabled = false);
  };
}

// Minimal ANSI parser — covers the \e[3xm fg color codes + \e[1m bold + \e[0m
// reset that 95% of CLI tools emit. Returns an array of {text, classes:[]}.
// Skips 256-color (\e[38;5;...m) and RGB (\e[38;2;...m) modes — those fall
// through as plain text. Good enough for our localhost utility's output.
const ANSI_FG = { "30": "ansi-fg-gray", "31": "ansi-fg-red", "32": "ansi-fg-green",
                  "33": "ansi-fg-yellow", "34": "ansi-fg-blue", "35": "ansi-fg-magenta",
                  "36": "ansi-fg-cyan", "37": "ansi-fg-gray", "90": "ansi-fg-gray",
                  "91": "ansi-fg-red", "92": "ansi-fg-green", "93": "ansi-fg-yellow",
                  "94": "ansi-fg-blue", "95": "ansi-fg-magenta", "96": "ansi-fg-cyan" };
function parseAnsi(text) {
  if (!text || text.indexOf("\x1b[") === -1) return [{ text, classes: [] }];
  const out = [];
  let classes = [];
  const re = /\x1b\[([0-9;]*)m/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push({ text: text.slice(last, m.index), classes: [...classes] });
    const codes = (m[1] || "0").split(";");
    for (const code of codes) {
      if (code === "0" || code === "") classes = [];
      else if (code === "1") { if (!classes.includes("ansi-bold")) classes.push("ansi-bold"); }
      else if (ANSI_FG[code]) classes = classes.filter((c) => !c.startsWith("ansi-fg-")).concat([ANSI_FG[code]]);
    }
    last = re.lastIndex;
  }
  if (last < text.length) out.push({ text: text.slice(last), classes: [...classes] });
  return out;
}

// Highlight any matches of `query` within `text` by wrapping them in a span.
function buildLineWithHighlight(text, query) {
  const segments = parseAnsi(text);
  const frag = document.createDocumentFragment();
  const lower = query.toLowerCase();
  for (const seg of segments) {
    if (!query) {
      const s = document.createElement("span");
      if (seg.classes.length) s.className = seg.classes.join(" ");
      s.textContent = seg.text;
      frag.appendChild(s);
      continue;
    }
    // Highlight matches within the segment.
    const t = seg.text;
    let i = 0;
    while (i < t.length) {
      const found = t.toLowerCase().indexOf(lower, i);
      if (found === -1) {
        const tail = document.createElement("span");
        if (seg.classes.length) tail.className = seg.classes.join(" ");
        tail.textContent = t.slice(i);
        frag.appendChild(tail);
        break;
      }
      if (found > i) {
        const pre = document.createElement("span");
        if (seg.classes.length) pre.className = seg.classes.join(" ");
        pre.textContent = t.slice(i, found);
        frag.appendChild(pre);
      }
      const hl = document.createElement("span");
      hl.className = "hl" + (seg.classes.length ? " " + seg.classes.join(" ") : "");
      hl.textContent = t.slice(found, found + query.length);
      frag.appendChild(hl);
      i = found + query.length;
    }
  }
  return frag;
}

function appendLine(text, cls = "") {
  // Two render targets:
  //   - bottom #output (always present, visible on non-overview tabs)
  //   - top #output-host-top (Overview's terminal pane, present only when overview is mounted)
  // Both stay in sync so cleans triggered from any tab show in whichever pane
  // the user is viewing. Each line stores the raw text on dataset.raw so the
  // search-filter can re-run against the original (post-ANSI-strip) text.
  const targets = [];
  const bottom = $("#output");
  if (bottom) targets.push(bottom);
  const topHost = $("#output-host-top");
  if (topHost) targets.push(topHost);

  const idle = $("#terminal-idle");
  if (idle) idle.style.display = "none";

  const query = ($("#terminal-search")?.value || "").trim();
  const rawForSearch = text.replace(/\x1b\[[0-9;]*m/g, "");
  const matchesFilter = !query || rawForSearch.toLowerCase().includes(query.toLowerCase());

  for (const out of targets) {
    if (out.id === "output" && !out.classList.contains("visible")) out.classList.add("visible");
    const span = document.createElement("span");
    span.className = "out-line" + (cls ? " " + cls : "") + (matchesFilter ? "" : " filtered-out");
    span.dataset.raw = rawForSearch;
    span.appendChild(buildLineWithHighlight(text, query));
    out.appendChild(span);
    safeAnimate(span, { opacity: [0, 1], y: [-3, 0] }, { duration: 0.18, easing: [0.22, 1, 0.36, 1] });
    out.scrollTop = out.scrollHeight;
  }
}

// Re-filter every existing line in both terminal targets when the search input
// changes. Cheap — at most a few hundred spans typically.
function applyTerminalFilter() {
  const query = ($("#terminal-search")?.value || "").trim();
  const lower = query.toLowerCase();
  const targets = ["#output", "#output-host-top"];
  for (const sel of targets) {
    const host = $(sel);
    if (!host) continue;
    for (const span of host.querySelectorAll(".out-line")) {
      const raw = span.dataset.raw || span.textContent || "";
      const ok = !query || raw.toLowerCase().includes(lower);
      span.classList.toggle("filtered-out", !ok);
      // Re-build highlights only when the query changed materially.
      if (query) {
        const child = span.firstChild;
        // Skip if it's already rendered with highlights we'd duplicate — for
        // simplicity, just clear and re-render.
        while (span.firstChild) span.removeChild(span.firstChild);
        span.appendChild(buildLineWithHighlight(raw, query));
      } else {
        // No query — re-render plain so any stale highlight spans are stripped.
        while (span.firstChild) span.removeChild(span.firstChild);
        span.appendChild(buildLineWithHighlight(raw, ""));
      }
    }
  }
}

function clearOutput() {
  const bottom = $("#output");
  const topHost = $("#output-host-top");
  if (bottom) bottom.innerHTML = "";
  if (topHost) {
    topHost.innerHTML = '<span class="terminal-idle" id="terminal-idle">Idle — nothing is running. Hit Scan or Clean to see live output.</span>';
  }
}

function successPulse(freedGb) {
  if (!M || PRM || !freedGb || freedGb <= 0) return;
  const free = $("#free-gb");
  if (free) safeAnimate(free, { scale: [1, 1.05, 1] }, { duration: 0.5, easing: [0.22, 1, 0.36, 1] });
}

// ── Aggregate scan + clean ─────────────────────────────────
async function scanEverything(opts = {}) {
  const btn = $("#btn-scan-all");
  if (btn && !opts.silent) { btn.disabled = true; }
  $("#btn-clean-all-safe") && ($("#btn-clean-all-safe").disabled = true);
  $("#btn-clean-all-optin") && ($("#btn-clean-all-optin").disabled = true);
  const hint = $("#ga-hint");
  if (hint) hint.innerHTML = "Scanning every category in parallel…";

  const allCats = tabsState.allCategories.length ? tabsState.allCategories : ["xcode", "llms-claude", "llms-cursor", "llms-chatgpt", "docker", "apps", "creative-adobe", "creative-davinci", "creative-finalcut", "creative-logic", "creative-blender", "creative-obs", "system"];
  let completed = 0;
  const progress = () => `Scanning ${allCats.length} categories… <strong>${completed}/${allCats.length}</strong>`;
  if (hint) hint.innerHTML = progress();
  await Promise.all(allCats.map(c =>
    scanAndRender(c)
      .catch(() => null)
      .finally(() => {
        completed++;
        if (hint) hint.innerHTML = progress();
        renderOverviewGrid();
        updateVtabStats();
      })
  ));

  let totalSafe = 0, totalOptIn = 0;
  for (const c of allCats) {
    const s = tabsState.scans[c]; if (!s) continue;
    totalSafe  += s.totals.safe || 0;
    totalOptIn += s.totals.probably_safe || 0;
  }
  const safeBtn = $("#btn-clean-all-safe"), optBtn = $("#btn-clean-all-optin");
  if (safeBtn) {
    safeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Clean ALL safe · ${fmt(totalSafe)} GB`;
    safeBtn.disabled = totalSafe < 0.001;
  }
  if (optBtn) {
    optBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4"/><path d="M12 17h.01"/></svg>Clean ALL opt-in · ${fmt(totalOptIn)} GB`;
    optBtn.disabled = totalOptIn < 0.001;
  }
  if (hint) {
    if (totalSafe + totalOptIn < 0.01) {
      hint.innerHTML = `<strong>You're clean.</strong> Nothing to reclaim across all ${allCats.length} categories.`;
    } else {
      hint.innerHTML = `<strong>${fmt(totalSafe + totalOptIn)} GB cleanable</strong> across ${allCats.length} categories. Click a card below to drill in, or use the buttons above.`;
    }
  }
  if (btn) { btn.disabled = false; btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v6h-6"/></svg>Re-scan everything`; }
}

async function cleanEverything(tier) {
  const label = tier === "safe" ? "ALL safe" : "ALL opt-in";
  let total = 0;
  for (const c of tabsState.allCategories) {
    const s = tabsState.scans[c]; if (!s) continue;
    total += s.totals[tier] || 0;
  }
  const okPress = await openConfirm({
    title: "Confirm cleanup",
    what: `Clean ${label} across every category?`,
    detail: `Frees ~${fmt(total)} GB total. Same rm -rf the per-tab buttons run, just batched.`,
    costText: tier === "safe"
      ? "First build after this regenerates Xcode caches (~30s extra). Browser caches re-fetch. LLM tool indexes rebuild on next open. Caution-tier items are NOT touched."
      : "Opt-in caches you've explicitly trusted are removed. Plus everything safe. Caution-tier items are still NOT touched.",
    danger: true,
    okLabel: `Clean ${tier === "safe" ? "safe-tier" : "opt-in-tier"} everywhere`,
  });
  if (!okPress) return;

  disableAllButtons(true);
  const out = $("#output");
  out.innerHTML = ""; out.classList.add("visible");
  appendLine(`→ Clean ${label} across every category`, "dim");

  const es = new EventSource(`/api/clean-everything?tier=${encodeURIComponent(tier)}`);
  es.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === "line") {
      const line = msg.data;
      let cls = "";
      if (line.startsWith("▶") || line.startsWith("✓")) cls = "ok";
      else if (line.startsWith("[")) cls = "warn";
      else if (line.startsWith("  cleaning:")) cls = "dim";
      appendLine(line, cls);
    } else if (msg.event === "done") {
      es.close();
      appendLine(`✓ Done. Freed ${fmt(msg.data.freed_gb)} GB across all categories.`, "ok");
      successPulse(msg.data.freed_gb);
      disableAllButtons(false);
      loadStatus(); loadHistory();
      scanEverything({ silent: true });
    }
  };
  es.onerror = () => { es.close(); appendLine("✗ Connection lost.", "err"); disableAllButtons(false); };
}

// ── Confirm modal (replaces window.confirm) ────────────────
function openConfirm(opts) {
  const modal = $("#confirm-modal");
  $("#confirm-title").textContent = opts.title || "Confirm";
  $("#confirm-what").textContent  = opts.what || "Continue?";
  const detail = $("#confirm-detail");
  if (opts.detail) { detail.textContent = opts.detail; detail.hidden = false; }
  else { detail.hidden = true; }
  const cost = $("#confirm-cost-block");
  if (opts.costText) { $("#confirm-cost-text").textContent = opts.costText; cost.hidden = false; }
  else { cost.hidden = true; }
  const okBtn = $("#confirm-ok");
  okBtn.textContent = opts.okLabel || "Confirm";
  okBtn.classList.toggle("danger", !!opts.danger);

  modal.hidden = false;
  safeAnimate(modal.querySelector(".modal-card"), { opacity: [0, 1], scale: [0.96, 1] }, { duration: 0.22, easing: [0.34, 1.56, 0.64, 1] });

  return new Promise((resolve) => {
    const cleanup = (result) => {
      modal.hidden = true;
      okBtn.onclick = null;
      $("#confirm-cancel").onclick = null;
      $("#confirm-close").onclick = null;
      modal.removeEventListener("click", onBackdrop);
      document.removeEventListener("keydown", onKey);
      resolve(result);
    };
    const onBackdrop = (ev) => { if (ev.target === modal) cleanup(false); };
    const onKey = (ev) => { if (ev.key === "Escape") cleanup(false); else if (ev.key === "Enter") cleanup(true); };
    okBtn.onclick = () => cleanup(true);
    $("#confirm-cancel").onclick = () => cleanup(false);
    $("#confirm-close").onclick  = () => cleanup(false);
    modal.addEventListener("click", onBackdrop);
    document.addEventListener("keydown", onKey);
    setTimeout(() => okBtn.focus(), 30);
  });
}

// ── Changelog modal ─────────────────────────────────────────
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function renderInline(s) {
  return escapeHtml(s)
    .replace(/`([^`]+)`/g,  "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g,    "<em>$1</em>");
}
function renderMarkdown(md) {
  const lines = md.split("\n");
  let html = "", inUl = false;
  const closeUl = () => { if (inUl) { html += "</ul>"; inUl = false; } };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (line.startsWith("# ")) { closeUl(); continue; }
    if (line.startsWith("## ")) { closeUl(); html += `<h2>${escapeHtml(line.slice(3))}</h2>`; }
    else if (line.startsWith("### ")) { closeUl(); html += `<h3>${escapeHtml(line.slice(4))}</h3>`; }
    else if (line.startsWith("- ")) { if (!inUl) { html += "<ul>"; inUl = true; } html += `<li>${renderInline(line.slice(2))}</li>`; }
    else if (line === "") { closeUl(); }
    else { closeUl(); html += `<p>${renderInline(line)}</p>`; }
  }
  if (inUl) html += "</ul>";
  return html;
}
async function openChangelog() {
  $("#changelog-modal").hidden = false;
  $("#changelog-body").textContent = "Loading…";
  safeAnimate($("#changelog-modal").querySelector(".modal-card"), { opacity: [0, 1], scale: [0.97, 1] }, { duration: 0.22, easing: [0.34, 1.56, 0.64, 1] });
  try {
    const r = await fetch("/api/changelog");
    const md = await r.text();
    $("#changelog-body").innerHTML = renderMarkdown(md);
    $("#changelog-body").scrollTop = 0;
  } catch (e) {
    $("#changelog-body").textContent = "Failed to load changelog.";
  }
}
function closeChangelog() { $("#changelog-modal").hidden = true; }

// ── Wire-up ─────────────────────────────────────────────────
$("#version").addEventListener("click", openChangelog);
$("#changelog-close").addEventListener("click", closeChangelog);
$("#changelog-modal").addEventListener("click", (ev) => { if (ev.target.id === "changelog-modal") closeChangelog(); });
document.addEventListener("keydown", (ev) => { if (ev.key === "Escape" && !$("#changelog-modal").hidden) closeChangelog(); });
$("#footer-changelog")?.addEventListener("click", (ev) => { ev.preventDefault(); openChangelog(); });

// ── /api/live SSE subscription (v0.15.0, elevations F + G) ────────────────
// One persistent connection. Auto-reconnects with backoff on disconnect.
let liveES = null;
let liveBackoffMs = 1000;
function subscribeLive() {
  try { if (liveES) liveES.close(); } catch {}
  liveES = new EventSource("/api/live");
  liveES.onopen = () => { liveBackoffMs = 1000; };
  liveES.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.event === "status") {
        tabsState.diskStatus = msg.data;
        paintHero();
      } else if (msg.event === "running") {
        tabsState.runningCleans = msg.data || [];
        renderRunningWidget();
      }
    } catch {}
  };
  liveES.onerror = () => {
    try { liveES.close(); } catch {}
    setTimeout(subscribeLive, liveBackoffMs);
    liveBackoffMs = Math.min(liveBackoffMs * 1.6, 15000);
  };
}

function renderRunningWidget() {
  const widget = $("#running-widget");
  const label  = $("#running-label");
  const dots   = $("#running-dots");
  if (!widget || !label || !dots) return;
  const list = tabsState.runningCleans || [];
  if (list.length === 0) {
    widget.hidden = true;
    return;
  }
  widget.hidden = false;
  // Group by category for the visible dot rail.
  const byCat = {};
  for (const r of list) byCat[r.category] = (byCat[r.category] || 0) + 1;
  const n = list.length;
  label.innerHTML = `<strong>${n}</strong> clean${n === 1 ? "" : "s"} running`;
  dots.innerHTML = Object.keys(byCat).map((cat) => {
    const color = PIE_COLORS[cat] || "#888";
    const title = `${cat}: ${byCat[cat]} active`;
    return `<span class="running-dot" style="background:${color}" title="${title}"></span>`;
  }).join("");
}

// Terminal toolbar wiring (added after panels mount, since the toolbar lives
// inside the Overview panel and is built by buildOverviewPanel).
function wireTerminalToolbar() {
  const search = $("#terminal-search");
  const clear = $("#terminal-clear");
  if (search && !search.dataset.wired) {
    search.dataset.wired = "1";
    search.addEventListener("input", applyTerminalFilter);
    search.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { search.value = ""; applyTerminalFilter(); search.blur(); }
    });
  }
  if (clear && !clear.dataset.wired) {
    clear.dataset.wired = "1";
    clear.addEventListener("click", () => {
      if (typeof clearOutput === "function") clearOutput();
      if (search) { search.value = ""; applyTerminalFilter(); }
    });
  }
}

// Global Ctrl+F / Cmd+F → focus the terminal search box (when Overview is active).
document.addEventListener("keydown", (e) => {
  if ((e.key === "f" || e.key === "F") && (e.metaKey || e.ctrlKey)) {
    const search = $("#terminal-search");
    if (search && tabsState.current === "overview") {
      e.preventDefault();
      search.focus();
      search.select();
    }
  }
});

// First-visit coachmark on the pie pane (elevation I).
function maybeShowCoachmark() {
  try {
    if (localStorage.getItem("cleanupHub.coachmark.v15") === "1") return;
  } catch { return; }
  // Defer until the pie pane is in the DOM.
  const tryShow = (attempt = 0) => {
    const pieEl = $("#overview-pie")?.closest(".pane-pie");
    if (!pieEl) {
      if (attempt < 30) setTimeout(() => tryShow(attempt + 1), 200);
      return;
    }
    const rect = pieEl.getBoundingClientRect();
    const coach = document.createElement("div");
    coach.className = "coachmark";
    coach.style.left = rect.left + "px";
    coach.style.top = rect.top + "px";
    coach.style.width = rect.width + "px";
    coach.style.height = rect.height + "px";
    coach.innerHTML = `<div class="coach-label">New: click a slice to drill in</div>`;
    document.body.appendChild(coach);
    const dismiss = () => {
      coach.style.opacity = "0";
      setTimeout(() => coach.remove(), 380);
      try { localStorage.setItem("cleanupHub.coachmark.v15", "1"); } catch {}
      const pie = $("#overview-pie");
      if (pie) {
        pie.removeEventListener("click", dismiss, true);
        $("#pie-legend")?.removeEventListener("click", dismiss, true);
      }
    };
    // Auto-dismiss after 12s, or when the user actually clicks the thing the
    // coachmark is pointing at (a slice or a legend item — both wired below).
    setTimeout(dismiss, 12000);
    setTimeout(() => {
      $("#overview-pie")?.addEventListener("click", dismiss, true);
      $("#pie-legend")?.addEventListener("click", dismiss, true);
    }, 400);
    // Re-anchor on resize.
    window.addEventListener("resize", () => {
      const r = pieEl.getBoundingClientRect();
      coach.style.left = r.left + "px"; coach.style.top = r.top + "px";
      coach.style.width = r.width + "px"; coach.style.height = r.height + "px";
    });
  };
  tryShow();
}

// v0.18.3 — wire the three-state theme switcher (Auto / Light / Dark).
// The CSS already supports both prefers-color-scheme AND [data-theme="..."],
// so we just toggle the attribute and persist. The early script in <head>
// applies the saved value before paint so there's no flash on load.
(function wireThemeToggle() {
  const segments = document.querySelectorAll(".theme-seg");
  if (!segments.length) return;
  const STORAGE_KEY = "cleanupHub.theme.v18";

  const readMode = () => {
    try {
      const v = localStorage.getItem(STORAGE_KEY);
      return (v === "light" || v === "dark") ? v : "auto";
    } catch { return "auto"; }
  };
  const apply = (mode) => {
    const root = document.documentElement;
    if (mode === "auto") root.removeAttribute("data-theme");
    else root.setAttribute("data-theme", mode);
  };
  const reflect = (mode) => {
    segments.forEach((b) => {
      const active = b.dataset.themeSet === mode;
      b.setAttribute("aria-checked", active ? "true" : "false");
    });
  };
  const choose = (mode) => {
    apply(mode);
    reflect(mode);
    try {
      if (mode === "auto") localStorage.removeItem(STORAGE_KEY);
      else localStorage.setItem(STORAGE_KEY, mode);
    } catch { /* private mode */ }
  };

  reflect(readMode());
  segments.forEach((b) => b.addEventListener("click", () => choose(b.dataset.themeSet)));
})();

loadStatus();
loadHistory();
loadTabs();
// Replaces the v0.14 setInterval(loadStatus, 15000) poll. The /api/live SSE
// stream emits {event:"status"} on disk-status deltas + {event:"running"} on
// in-flight clean changes, so the hero ticks in real time and the running-
// widget surfaces multi-tab activity without per-second fetch churn.
subscribeLive();
