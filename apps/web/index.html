<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cleanup Hub</title>
    <script>
      // v0.18.3 — apply the saved theme before React mounts so there's no flash
      // of light when the user has Dark selected (or vice-versa). Reads the
      // same localStorage key the React ThemeToggle component writes.
      (function () {
        try {
          var v = localStorage.getItem("cleanupHub.theme.v18");
          if (v === "light" || v === "dark") {
            document.documentElement.setAttribute("data-theme", v);
          }
        } catch (e) { /* private mode — fall through to OS default */ }
      })();
    </script>
  </head>
  <body class="bg-bg-1 text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
